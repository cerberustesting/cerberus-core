<!--Enable Environment - Alpine.js/Tailwind refactored -->
<div x-data="eventEnableModal()"
     x-show="open"
     x-cloak
     @event-enable-modal-open.window="handleOpen($event.detail)"
     @event-enable-modal-close.window="open = false"
     class="crb_modal"
     id="eventEnableModal">

    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[900px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-green-600/10 flex items-center justify-center">
                    <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
                </div>
                <div>
                    <h4 class="!text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100" id="eventEnableModalLabel" name="eventEnableField">Enable Environment</h4>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0">Enable with new build revision and send notification</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen" class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-amber-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="open = false" class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex flex-col flex-1 min-h-0">
            <div class="w-full flex bg-slate-200 dark:bg-slate-700 p-1 mx-6 mb-2 rounded-lg shadow-sm h-10" style="width: calc(100% - 3rem);">
                <button type="button" @click="eTab = 'email'" :class="eTab === 'email' ? 'bg-slate-50 font-semibold dark:bg-slate-900' : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap" id="tab1Text" name="tab1Text">Email Preview</button>
                <button type="button" @click="eTab = 'install'" :class="eTab === 'install' ? 'bg-slate-50 font-semibold dark:bg-slate-900' : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap" id="tab2Text" name="tab2Text">Installation instruction</button>
            </div>

            <!-- BODY -->
            <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">
                <form id="eventEnableModalForm" name="eventEnableModalForm" role="form">
                    <div id="DialogMessagesArea" class="mb-3">
                        <div class="alert" id="DialogMessagesAlert" style="display:none;">
                            <strong><span class="alert-description" id="DialogAlertDescription"></span></strong>
                            <button type="button" class="close" data-hide="alert" aria-hidden="true"><span class="glyphicon glyphicon-remove alert-right alert-close pull-right"></span></button>
                        </div>
                    </div>

                    <!-- Key fields -->
                    <div class="grid grid-cols-3 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="systemField">System</label>
                            <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="system" id="system" readonly>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="countryField">Country</label>
                            <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="country" id="country" readonly>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="environmentField">Environment</label>
                            <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="environment" id="environment" readonly>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-3 mb-3">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="currentBuildField">Current Build</label>
                            <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="currentBuild" id="currentBuild" readonly>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="currentRevisionField">Current Revision</label>
                            <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="currentRevision" id="currentRevision" readonly>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="newBuildField">New Build</label>
                            <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="newBuild" name="newBuild"></select>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="newRevisionField">New Revision</label>
                            <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="newRevision" name="newRevision"></select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <button type="button" id="eventEnablePreviewNotificationButton" class="px-4 py-2 rounded-md bg-blue-400 text-white text-sm hover:bg-blue-700 transition" name="buttonEnablePreviewNotification">Preview Notification</button>
                    </div>

                    <!-- TAB: Email Preview -->
                    <div x-show="eTab === 'email'" id="tabsEnable-1">
                        <div class="space-y-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="toField">To</label><textarea class="w-full border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="notifTo" name="notifTo" readonly></textarea></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="ccField">Cc</label><textarea class="w-full border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="notifCc" name="notifCc" readonly></textarea></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="subjectField">Subject</label><input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="notifSubject" id="notifSubject" readonly></div>
                            <div id="notifBody" class="rounded-lg border border-slate-200 dark:border-slate-700 p-3 bg-white dark:bg-slate-800 min-h-[100px]"></div>
                        </div>
                    </div>

                    <!-- TAB: Installation instructions -->
                    <div x-show="eTab === 'install'" id="tabsEnable-2">
                        <div id="listPanelInstallInstructions">
                            <table class="w-full text-sm" id="installInstructionsTable">
                                <thead>
                                    <tr class="text-xs text-slate-500 dark:text-slate-400 uppercase">
                                        <th class="text-center py-2" id="buildHeader" name="buildHeader">Build</th>
                                        <th class="text-center py-2" id="revisionHeader" name="revisionHeader">Revision</th>
                                        <th class="text-center py-2" id="applicationHeader" name="applicationHeader">Application</th>
                                        <th class="text-center py-2" id="releaseHeader" name="releaseHeader">Release</th>
                                        <th class="text-center py-2" id="linkHeader" name="linkHeader">Deploy Link</th>
                                        <th class="text-center py-2" id="versionHeader" name="versionHeader">Version</th>
                                    </tr>
                                </thead>
                                <tbody id="installInstructionsTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
            <button type="button" @click="open = false" class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition" name="buttonClose">Close</button>
            <button type="button" id="eventEnableButton" class="px-4 py-2 rounded-md bg-green-500 text-white text-sm hover:bg-green-600 transition" name="buttonEnable">Enable and Send notification</button>
        </div>
    </div>
</div>

<script>
function eventEnableModal() {
    return {
        open: false, isFullscreen: false, eTab: 'email',
        handleOpen: function(detail) { this.open = true; this.eTab = 'email'; this.$nextTick(function() { if (window.lucide) lucide.createIcons(); }); },
        init: function() {
            var self = this;
            this.$watch('open', function(val) { if (!val && typeof eventEnableModalCloseHandler === 'function') eventEnableModalCloseHandler(); });
            this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
        }
    };
}
</script>
