<!-- TestCaseExecution V2 — Header Bar -->
<!-- Uses Cerberus design tokens -->

<div class="sticky top-0 z-40 mb-4 rounded-2xl" id="v2ExeHeader"
     style="background: var(--crb-new-bg); border: 1px solid var(--crb-grey-light-color)">

    <!-- Progress Bar -->
    <div class="w-full" style="padding: 8px 14px 0">
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold tabular-nums" :class="{
                'text-green-600': exe.controlStatus === 'OK',
                'text-red-600': exe.controlStatus === 'KO',
                'text-amber-600': exe.controlStatus === 'FA',
                'text-blue-600': exe.controlStatus === 'PE',
                'text-slate-400': !exe.controlStatus || ['NE','NA','WE','CA','QU'].includes(exe.controlStatus)
            }" x-text="progress + '%'"></span>
            <div class="flex-1 h-1.5 rounded-full" style="background: var(--crb-grey-lighter-color)">
                <div class="h-full rounded-full transition-all duration-700 ease-out"
                     :class="exe.controlStatus === 'PE' ? 'v2-exe-progress-animated' : ''"
                     :style="'width:' + progress + '%; background:' + (exe.controlStatus === 'OK' ? 'var(--crb-green-color)' : exe.controlStatus === 'KO' ? 'var(--crb-red-color)' : exe.controlStatus === 'FA' ? '#f59e0b' : exe.controlStatus === 'PE' ? 'var(--crb-blue-color)' : 'var(--crb-grey-color)')"></div>
            </div>
        </div>
    </div>

    <div class="p-3">
        <div class="flex items-center gap-2 flex-wrap">

            <!-- Back to Executions -->
            <button onclick="window.location.href='TestCaseExecution.jsp'"
                    class="inline-flex items-center justify-center h-8 w-8 rounded-lg transition-colors
                           hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 hover:text-sky-500 shrink-0"
                    data-tip="Back to Executions" data-tip-pos="bottom">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 12H5m7-7l-7 7 7 7"/></svg>
            </button>

            <!-- Test / TestCase + ID inline -->
            <div class="min-w-0 flex-1">
                <div class="flex items-center gap-1.5 text-sm font-semibold text-slate-800 dark:text-slate-200">
                    <a :href="'TestCaseList.jsp?test=' + encodeURIComponent(exe.test)"
                       class="truncate hover:text-sky-500 hover:underline transition-colors cursor-pointer"
                       x-text="exe.test || '-'" style="max-width: 200px"></a>
                    <span class="text-slate-400">/</span>
                    <a :href="'TestCaseScriptV2.jsp?test=' + encodeURIComponent(exe.test) + '&testcase=' + encodeURIComponent(exe.testcase || exe.testCase)"
                       class="truncate hover:text-sky-500 hover:underline transition-colors cursor-pointer"
                       x-text="exe.testcase || exe.testCase || '-'" style="max-width: 240px"></a>
                    <!-- Execution ID Badge inline -->
                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-bold shrink-0 ml-1"
                          :class="{
                              'bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400': exe.controlStatus === 'OK',
                              'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400': exe.controlStatus === 'KO',
                              'bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400': exe.controlStatus === 'FA',
                              'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400': exe.controlStatus === 'PE',
                              'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400': !exe.controlStatus || ['NE','NA','WE','CA','QU'].includes(exe.controlStatus)
                          }">
                        <span x-text="'#' + (exe.id || '-')"></span>
                    </span>
                </div>
                <div class="flex items-center gap-2 mt-0.5" style="padding-left: 2px">
                    <span class="text-[11px] text-slate-400 dark:text-slate-500 truncate max-w-md"
                          x-text="(testCaseObj && testCaseObj.description) || exe.description || ''"></span>
                </div>
            </div>

            <!-- Country / Environment badges -->
            <template x-if="exe.country">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                            bg-sky-50 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400
                            text-[10px] font-semibold shrink-0">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                    <span x-text="exe.country"></span>
                </span>
            </template>
            <template x-if="exe.environment">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                            bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400
                            text-[10px] font-semibold shrink-0">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
                    <span x-text="exe.environment"></span>
                </span>
            </template>

            <!-- Divider -->
            <div class="w-px h-6 bg-slate-200 dark:bg-slate-700 shrink-0"></div>

            <!-- Control Status Badge -->
            <div class="shrink-0 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold"
                 :class="{
                     'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400': exe.controlStatus === 'OK',
                     'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400': exe.controlStatus === 'KO',
                     'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400': exe.controlStatus === 'FA',
                     'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400': exe.controlStatus === 'PE',
                     'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-400': !exe.controlStatus || ['NE','NA','WE','CA','QU'].includes(exe.controlStatus)
                 }">
                <svg class="w-3.5 h-3.5" :class="exe.controlStatus === 'PE' ? 'animate-spin' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <template x-if="exe.controlStatus === 'OK'"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></template>
                    <template x-if="exe.controlStatus === 'KO'"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></template>
                    <template x-if="exe.controlStatus === 'FA'"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></template>
                    <template x-if="exe.controlStatus === 'PE'"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></template>
                    <template x-if="!exe.controlStatus || ['NE','NA','WE','CA','QU'].includes(exe.controlStatus)"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></template>
                </svg>
                <span x-text="_getStatusLabel(exe.controlStatus)"></span>
            </div>

            <!-- Duration -->
            <template x-if="exe.start">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                            bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400
                            text-[10px] font-semibold shrink-0">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span x-text="formatDuration(exe.start, exe.end || Date.now())"></span>
                </span>
            </template>

            <!-- Divider -->
            <div class="w-px h-6 bg-slate-200 dark:bg-slate-700 shrink-0"></div>

            <!-- False Negative toggle -->
            <button @click="toggleFalseNegative()"
                    class="inline-flex items-center gap-1 px-2 py-1 rounded-lg text-[11px] font-semibold transition-colors shrink-0"
                    :class="falseNegative ? 'bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700'"
                    data-tip="Toggle False Negative" data-tip-pos="bottom">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/></svg>
                <span x-show="falseNegative">FN</span>
            </button>

            <!-- Save status badge -->
            <template x-if="saveState !== ''">
                <div class="inline-flex items-center gap-2 shrink-0">
                    <div class="inline-flex items-center gap-1 text-[11px] px-1.5 py-0.5 rounded-md"
                         :class="{
                            'text-emerald-500': saveState === 'saved',
                            'text-amber-500 bg-amber-50 dark:bg-amber-900/20': saveState === 'dirty',
                            'text-sky-500': saveState === 'saving'
                         }">
                        <span class="w-1.5 h-1.5 rounded-full bg-current"
                              :class="saveState === 'saving' ? 'v2-pulse' : ''"></span>
                        <span x-text="saveState === 'saving' ? 'Saving...'
                                     : saveState === 'saved'  ? 'Saved'
                                     : saveState === 'dirty'  ? 'Unsaved'
                                     : ''"></span>
                    </div>
                </div>
            </template>

            <!-- Save button (manual mode) -->
            <template x-if="isManual">
                <button @click="save()" :disabled="saveState !== 'dirty'"
                        class="v2-header-action-btn shrink-0 transition-all duration-300"
                        :class="saveState === 'dirty' ? 'v2-save-nudge' : ''"
                        :style="saveState === 'dirty' ? 'background: var(--crb-blue-color)' : 'background: var(--crb-grey-color); opacity: 0.45; cursor: not-allowed'"
                        data-tip="Save (Ctrl+S)">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Save
                </button>
            </template>

            <!-- Run button (opens execution modal with same params) -->
            <button @click="reRun()"
                    class="v2-exe-run-btn v2-exe-run-btn--primary shrink-0"
                    data-tip="Run this test case">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Run
            </button>

            <!-- Rerun Same button -->
            <button @click="reRunSame()"
                    class="v2-exe-run-btn v2-exe-run-btn--secondary shrink-0"
                    data-tip="Re-run with same parameters" data-tip-pos="bottom">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                Rerun
            </button>

            <!-- Last Executions dropdown -->
            <div x-data="{ exeListOpen: false }" class="relative shrink-0" @click.outside="exeListOpen = false">
                <button @click="exeListOpen = !exeListOpen"
                        class="v2-header-rerun-btn"
                        data-tip="Last executions" data-tip-pos="bottom">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </button>
                <div x-show="exeListOpen" x-cloak x-transition.opacity.duration.150ms
                     class="absolute right-0 top-full mt-1 z-50 rounded-xl border shadow-xl"
                     style="min-width: 320px; max-height: 320px; overflow-y: auto; background: var(--crb-new-bg); border-color: var(--crb-grey-light-color)">
                    <div style="padding: 8px 10px; border-bottom: 1px solid var(--crb-grey-light-color); font-size: 11px; font-weight: 600; color: var(--crb-grey-color)">
                        Last Executions
                    </div>
                    <div style="padding: 4px">
                        <template x-for="e in lastExecutions" :key="e.id">
                            <button @click="switchToExecution(e.id); exeListOpen = false"
                                    class="flex items-center gap-2 w-full text-left transition-colors"
                                    :style="e.id == exe.id ? 'background: color-mix(in srgb, var(--crb-blue-color) 10%, transparent); font-weight:600' : ''"
                                    style="padding: 6px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; border: none"
                                    @mouseenter="$el.style.background = e.id == exe.id ? 'color-mix(in srgb, var(--crb-blue-color) 15%, transparent)' : 'var(--crb-grey-extra-light-color)'"
                                    @mouseleave="$el.style.background = e.id == exe.id ? 'color-mix(in srgb, var(--crb-blue-color) 10%, transparent)' : 'transparent'">
                                <span class="w-2 h-2 rounded-full shrink-0"
                                      :class="{
                                          'bg-green-500': e.controlStatus === 'OK',
                                          'bg-red-500': e.controlStatus === 'KO',
                                          'bg-amber-500': e.controlStatus === 'FA',
                                          'bg-blue-500': e.controlStatus === 'PE',
                                          'bg-slate-400': !e.controlStatus || ['NE','NA','WE','CA','QU'].includes(e.controlStatus)
                                      }"></span>
                                <span class="font-mono text-[11px]" x-text="'#' + e.id"></span>
                                <span class="text-[10px] opacity-60" x-text="e.country + ' / ' + e.env"></span>
                                <span class="text-[10px] opacity-40 ml-auto" x-text="e.tag || ''"></span>
                            </button>
                        </template>
                        <div x-show="lastExecutions.length === 0"
                             style="padding: 12px; text-align:center; font-size: 12px; color: var(--crb-grey-color)">No executions found</div>
                    </div>
                </div>
            </div>

            <!-- More actions -->
            <div x-data="{ moreOpen: false }" class="relative shrink-0">
                <button @click="moreOpen = !moreOpen" @click.outside="moreOpen = false"
                        class="inline-flex items-center justify-center h-8 w-8 rounded-lg border border-slate-200 dark:border-slate-700
                               text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                </button>
                <div x-show="moreOpen" x-cloak x-transition
                     class="absolute right-0 top-full mt-1 w-56 rounded-xl border border-slate-200 dark:border-slate-700
                            bg-white dark:bg-slate-800 shadow-lg p-1 z-50">
                    <button class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-xs text-slate-700 dark:text-slate-300
                                   hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="window.open('TestCaseScriptV2.jsp?test=' + encodeURIComponent(exe.test) + '&testcase=' + encodeURIComponent(exe.testcase || exe.testCase), '_blank'); moreOpen = false">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2M8 17h2"/></svg>
                        Edit Test Case Script
                    </button>
                    <button class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-xs text-slate-700 dark:text-slate-300
                                   hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="if(exe.tag) window.open('ReportingExecutionByTag.jsp?Tag=' + encodeURIComponent(exe.tag), '_blank'); moreOpen = false">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                        Campaign Report
                    </button>
                    <div class="h-px bg-slate-100 dark:bg-slate-700 my-1"></div>
                    <button class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-xs text-slate-700 dark:text-slate-300
                                   hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="createBug(); moreOpen = false"
                            x-show="applicationObj && applicationObj.bugTrackerUrl">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M8 2l1.88 1.88M14.12 3.88L16 2M9 7.13v-1a3.003 3.003 0 116 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 014-4h4a4 4 0 014 4v3c0 3.3-2.7 6-6 6z"/><path d="M12 20v-9M6.53 9C4.6 8.8 3 7.1 3 5M6 13H2M6 17H2M18 13h4M18 17h4M20.97 5c0 2.1-1.6 3.8-3.5 4"/></svg>
                        Create Bug
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
