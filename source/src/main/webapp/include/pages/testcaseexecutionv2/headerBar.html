<!-- TestCaseExecution V2 - Header Bar -->

<div class="sticky top-0 z-40 mb-4 rounded-2xl" id="v2ExeHeader"
     style="background: var(--crb-new-bg); border: 1px solid var(--crb-grey-light-color); overflow: hidden">

    <!-- Progress Bar - integrated flush with header border-radius -->
    <div style="height: 6px; overflow: hidden; border-radius: 16px 16px 0 0; background-color: #e2e8f0">
        <div style="height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease"
             :class="exe.controlStatus === 'PE' ? 'v2-exe-progress-animated' : ''"
             x-bind:style="{ width: Math.max(progressBar, 0) + '%', backgroundColor: progressColor, boxShadow: progressBar > 0 ? ('0 0 10px ' + progressColor) : 'none' }"></div>
    </div>

    <div class="p-3">
        <div class="flex items-center gap-2 flex-wrap">

            <!-- Back to Test Case Script V2 -->
            <button @click="window.location.href='TestCaseScriptV2.jsp?test=' + encodeURIComponent(exe.test || '') + '&testcase=' + encodeURIComponent(exe.testcase || exe.testCase || '')"
                    class="inline-flex items-center justify-center h-8 w-8 rounded-lg transition-colors
                           hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 hover:text-sky-500 shrink-0">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
            </button>

            <!-- Test / TestCase + ID inline -->
            <div class="min-w-0 flex-1">
                <div class="flex items-center gap-1.5 text-sm font-semibold text-slate-800 dark:text-slate-200">
                    <a :href="'TestCaseList.jsp?test=' + encodeURIComponent(exe.test)"
                       class="truncate hover:text-sky-500 hover:underline transition-colors cursor-pointer"
                       x-text="exe.test || '-'" style="max-width: 200px"></a>
                    <span class="text-slate-400">/</span>
                    <a :href="'TestCaseScriptV2.jsp?test=' + encodeURIComponent(exe.test) + '&testcase=' + encodeURIComponent(exe.testcase || exe.testCase)"
                       class="truncate hover:text-sky-500 hover:underline transition-colors cursor-pointer"
                       x-text="exe.testcase || exe.testCase || '-'" style="max-width: 240px"></a>
                    <!-- Execution ID Badge inline -->
                    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-bold shrink-0 ml-1"
                          :class="{
                              'bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400': exe.controlStatus === 'OK',
                              'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400': exe.controlStatus === 'KO',
                              'bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400': exe.controlStatus === 'FA',
                              'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400': exe.controlStatus === 'PE',
                              'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400': !exe.controlStatus || ['NE','NA','WE','CA','QU'].includes(exe.controlStatus)
                          }">
                        <span x-text="'#' + (exe.id || '-')"></span>
                    </span>
                </div>
                <div class="flex items-center gap-2 mt-0.5" style="padding-left: 2px">
                    <span class="text-[11px] text-slate-400 dark:text-slate-500 truncate max-w-md"
                          x-text="(testCaseObj && testCaseObj.description) || exe.description || ''"></span>
                </div>
                <!-- Robot / Browser / Platform / App badges -->
                <div class="flex items-center gap-1.5 mt-1 flex-wrap" style="padding-left: 2px">
                    <template x-if="exe.browser">
                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                                    bg-sky-50 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400
                                    text-[10px] font-semibold shrink-0">
                            <img :src="'./images/browser-' + exe.browser + '.png'"
                                 class="h-3.5 w-3.5 object-contain"
                                 @error="$el.style.display='none'">
                            <span x-text="exe.browser + (exe.version ? ' ' + exe.version : '')"></span>
                        </span>
                    </template>
                    <template x-if="exe.platform">
                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                                    bg-sky-50 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400
                                    text-[10px] font-semibold shrink-0">
                            <img :src="'./images/platform-' + exe.platform.toUpperCase() + '.png'"
                                 class="h-3.5 w-3.5 object-contain"
                                 @error="$el.style.display='none'">
                            <span x-text="exe.platform"></span>
                        </span>
                    </template>
                    <template x-if="exe.application">
                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                                    bg-sky-50 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400
                                    text-[10px] font-semibold shrink-0">
                            <img :src="'./images/logoapp-' + ((applicationObj && applicationObj.type) || 'NONE') + '.png'"
                                 class="h-3.5 w-3.5 object-contain"
                                 @error="$el.style.display='none'">
                            <span x-text="exe.application"></span>
                        </span>
                    </template>
                </div>
            </div>

            <!-- Country / Environment badges -->
            <template x-if="exe.country">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                            bg-sky-50 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400
                            text-[10px] font-semibold shrink-0">
                    <i data-lucide="flag" class="w-3 h-3"></i>
                    <span x-text="exe.country"></span>
                </span>
            </template>
            <template x-if="exe.environment">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                            bg-sky-50 dark:bg-sky-900/30 text-sky-600 dark:text-sky-400
                            text-[10px] font-semibold shrink-0">
                    <i data-lucide="earth" class="w-3 h-3"></i>
                    <span x-text="exe.environment"></span>
                </span>
            </template>

            <!-- Divider -->
            <div class="w-px h-6 bg-slate-200 dark:bg-slate-700 shrink-0"></div>

            <!-- Control Status Badge -->
            <div class="shrink-0 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold"
                 :class="{
                     'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400': exe.controlStatus === 'OK',
                     'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400': exe.controlStatus === 'KO',
                     'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400': exe.controlStatus === 'FA',
                     'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400': exe.controlStatus === 'PE',
                     'bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-400': !exe.controlStatus || ['NE','NA','WE','CA','QU'].includes(exe.controlStatus)
                 }">
                <i :data-lucide="_getStatusIcon(exe.controlStatus)"
                   class="w-3.5 h-3.5"
                   :class="(exe.controlStatus === 'PE' || _spinDone) ? 'v2-exe-spin-limited' : ''"></i>
                <span x-text="_getStatusLabel(exe.controlStatus)"></span>
            </div>

            <!-- Duration -->
            <template x-if="exe.start">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-md
                            bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400
                            text-[10px] font-semibold shrink-0">
                    <i data-lucide="timer" class="w-3 h-3"></i>
                    <span x-text="formatDuration(exe.start, exe.end || Date.now())"></span>
                </span>
            </template>

            <!-- Live connection indicator -->
            <template x-if="liveStatus !== 'idle' && liveStatus !== 'done'">
                <span class="inline-flex items-center gap-1 text-[9px] px-1.5 py-0.5 rounded-md shrink-0"
                      :class="{
                          'text-emerald-500': liveStatus === 'ws',
                          'text-sky-500': liveStatus === 'polling',
                          'text-red-400 bg-red-50 dark:bg-red-900/20': liveStatus === 'error'
                      }">
                    <span class="w-1.5 h-1.5 rounded-full bg-current"
                          :class="liveStatus !== 'error' ? 'v2-pulse' : ''"></span>
                    <span x-text="liveStatus === 'ws' ? 'LIVE' : liveStatus === 'polling' ? 'POLL' : 'ERR'"></span>
                </span>
            </template>

            <!-- Progress % pill -->
            <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold tabular-nums shrink-0"
                  :class="{
                      'bg-green-50 text-green-600': exe.controlStatus === 'OK',
                      'bg-red-50 text-red-600': exe.controlStatus === 'KO',
                      'bg-amber-50 text-amber-600': exe.controlStatus === 'FA',
                      'bg-blue-50 text-blue-600': exe.controlStatus === 'PE',
                      'bg-slate-50 text-slate-400': !exe.controlStatus || ['NE','NA','WE','CA','QU'].includes(exe.controlStatus)
                  }"
                  x-text="progress + '%'"></span>

            <!-- Divider -->
            <div class="w-px h-6 bg-slate-200 dark:bg-slate-700 shrink-0"></div>

            <!-- False Negative toggle -->
            <button @click="toggleFalseNegative()"
                    class="inline-flex items-center gap-1 px-2 py-1 rounded-lg text-[11px] font-semibold transition-colors shrink-0"
                    :class="falseNegative ? 'bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100 dark:hover:bg-slate-700'"
                    data-tip="Toggle False Negative" data-tip-pos="bottom">
                <i data-lucide="flag-triangle-right" class="w-3.5 h-3.5"></i>
                <span x-show="falseNegative">FN</span>
            </button>

            <!-- Save status badge -->
            <template x-if="saveState !== ''">
                <div class="inline-flex items-center gap-2 shrink-0">
                    <div class="inline-flex items-center gap-1 text-[11px] px-1.5 py-0.5 rounded-md"
                         :class="{
                            'text-emerald-500': saveState === 'saved',
                            'text-amber-500 bg-amber-50 dark:bg-amber-900/20': saveState === 'dirty',
                            'text-sky-500': saveState === 'saving'
                         }">
                        <span class="w-1.5 h-1.5 rounded-full bg-current"
                              :class="saveState === 'saving' ? 'v2-pulse' : ''"></span>
                        <span x-text="saveState === 'saving' ? 'Saving...'
                                     : saveState === 'saved'  ? 'Saved'
                                     : saveState === 'dirty'  ? 'Unsaved'
                                     : ''"></span>
                    </div>
                </div>
            </template>

            <!-- Save button (manual mode) -->
            <template x-if="isManual">
                <button @click="save()" :disabled="saveState !== 'dirty'"
                        class="v2-exe-run-btn shrink-0 transition-all duration-300"
                        :class="saveState === 'dirty' ? 'v2-save-nudge' : ''"
                        :style="saveState === 'dirty' ? 'background: var(--crb-blue-color)' : 'background: var(--crb-grey-color); opacity: 0.45; cursor: not-allowed'"
                        data-tip="Save (Ctrl+S)">
                    <i data-lucide="save" class="w-3.5 h-3.5"></i>
                    Save
                </button>
            </template>

            <!-- LIVE button (only visible during PE / execution in progress) -->
            <template x-if="exe.controlStatus === 'PE' && exe.remoteLiveUrl">
                <button @click="openVisionModal('live', exe.remoteLiveUrl)"
                        class="v2-exe-run-btn shrink-0 v2-blink"
                        style="background: var(--crb-blue-color)"
                        data-tip="Watch live execution">
                    <i data-lucide="monitor-play" class="w-3.5 h-3.5"></i>
                    LIVE
                </button>
            </template>
            <template x-if="exe.controlStatus === 'PE' && exe.remoteControlLiveUrl">
                <button @click="openVisionModal('control', exe.remoteControlLiveUrl)"
                        class="v2-exe-run-btn shrink-0 v2-blink"
                        style="background: #8b5cf6"
                        data-tip="Remote control live session">
                    <i data-lucide="monitor-smartphone" class="w-3.5 h-3.5"></i>
                    LIVE CONTROL
                </button>
            </template>
            <!-- VIDEO button (visible when execution finished and has video files) -->
            <template x-if="exe.controlStatus !== 'PE' && _hasVideo()">
                <button @click="openVisionModal('video', _getVideoUrl())"
                        class="v2-exe-run-btn shrink-0"
                        style="background: #6366f1"
                        data-tip="Watch execution video">
                    <i data-lucide="film" class="w-3.5 h-3.5"></i>
                    VIDEO
                </button>
            </template>

            <!-- Run button -->
            <button @click="reRun()"
                    class="v2-exe-run-btn v2-exe-run-btn--primary shrink-0"
                    data-tip="Run this test case">
                <i data-lucide="play" class="w-3.5 h-3.5"></i>
                Run
            </button>

            <!-- Rerun Same button -->
            <button @click="reRunSame()"
                    class="v2-exe-run-btn v2-exe-run-btn--secondary shrink-0"
                    data-tip="Re-run with same parameters" data-tip-pos="bottom">
                <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                Rerun
            </button>

            <!-- Last Executions dropdown -->
            <div x-data="{ exeListOpen: false }" class="relative shrink-0" @click.outside="exeListOpen = false">
                <button @click="exeListOpen = !exeListOpen; $nextTick(() => { if(exeListOpen) { let r=$el.getBoundingClientRect(); let dd=$el.nextElementSibling; dd.style.top=(r.bottom+4)+'px'; dd.style.right=(window.innerWidth-r.right)+'px'; } })"
                        class="v2-header-rerun-btn"
                        data-tip="Last executions" data-tip-pos="bottom">
                    <i data-lucide="history" class="w-3.5 h-3.5"></i>
                </button>
                <div x-show="exeListOpen" x-cloak x-transition.opacity.duration.150ms
                     class="fixed z-[9999] rounded-xl border shadow-xl"
                     style="min-width: 380px; max-height: 400px; overflow-y: auto; background: var(--crb-new-bg); border-color: var(--crb-grey-light-color)">
                    <!-- Header -->
                    <div class="flex items-center gap-2" style="padding: 10px 12px; border-bottom: 1px solid var(--crb-grey-light-color)">
                        <i data-lucide="history" class="w-3.5 h-3.5" style="color: var(--crb-grey-color)"></i>
                        <span style="font-size: 11px; font-weight: 700; color: var(--crb-grey-color); text-transform: uppercase; letter-spacing: 0.05em">Last Executions</span>
                        <span class="text-[10px] font-bold px-1.5 py-0.5 rounded" style="background: var(--crb-grey-lighter-color); color: var(--crb-grey-color); margin-left: auto" x-text="lastExecutions.length"></span>
                    </div>
                    <!-- List -->
                    <div style="padding: 4px">
                        <template x-for="e in lastExecutions" :key="e.id">
                            <button @click="switchToExecution(e.id); exeListOpen = false"
                                    class="flex items-center gap-2.5 w-full text-left transition-all duration-150"
                                    :style="e.id == exe.id ? 'background: color-mix(in srgb, var(--crb-blue-color) 8%, transparent); border-left: 3px solid var(--crb-blue-color)' : 'border-left: 3px solid transparent'"
                                    style="padding: 7px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; border-top: none; border-right: none; border-bottom: none"
                                    @mouseenter="if(e.id != exe.id) $el.style.background = 'var(--crb-grey-extra-light-color)'"
                                    @mouseleave="$el.style.background = e.id == exe.id ? 'color-mix(in srgb, var(--crb-blue-color) 8%, transparent)' : 'transparent'">
                                <!-- Status dot + badge -->
                                <span class="inline-flex items-center justify-center w-5 h-5 rounded shrink-0"
                                      :class="{
                                          'bg-green-100 text-green-600': e.controlStatus === 'OK',
                                          'bg-red-100 text-red-600': e.controlStatus === 'KO',
                                          'bg-amber-100 text-amber-600': e.controlStatus === 'FA',
                                          'bg-blue-100 text-blue-600': e.controlStatus === 'PE',
                                          'bg-slate-100 text-slate-400': !e.controlStatus || ['NE','NA','WE','CA','QU'].includes(e.controlStatus)
                                      }">
                                    <i :data-lucide="_getStatusIcon(e.controlStatus)" class="w-2.5 h-2.5"
                                       :class="e.controlStatus === 'PE' ? 'v2-exe-spin-limited' : ''"></i>
                                </span>
                                <!-- ID -->
                                <span class="font-mono text-[11px] font-bold shrink-0" style="min-width: 55px"
                                      :style="e.id == exe.id ? 'color: var(--crb-blue-color)' : 'color: var(--crb-text-color)'"
                                      x-text="'#' + e.id"></span>
                                <!-- Status label -->
                                <span class="text-[9px] font-bold px-1.5 py-0.5 rounded shrink-0"
                                      :class="{
                                          'bg-green-50 text-green-600': e.controlStatus === 'OK',
                                          'bg-red-50 text-red-600': e.controlStatus === 'KO',
                                          'bg-amber-50 text-amber-600': e.controlStatus === 'FA',
                                          'bg-blue-50 text-blue-600': e.controlStatus === 'PE',
                                          'bg-slate-50 text-slate-400': !e.controlStatus || ['NE','NA','WE','CA','QU'].includes(e.controlStatus)
                                      }"
                                      x-text="e.controlStatus || 'NE'"></span>
                                <!-- Country / Env -->
                                <span class="text-[10px] truncate flex-1 min-w-0" style="color: var(--crb-grey-color)" x-text="(e.country || '') + ' / ' + (e.env || '')"></span>
                                <!-- Date -->
                                <span class="text-[9px] font-mono tabular-nums shrink-0" style="color: var(--crb-grey-color); opacity: 0.7"
                                      x-text="e.end ? new Date(e.end).toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '...'"></span>
                            </button>
                        </template>
                        <div x-show="lastExecutions.length === 0"
                             class="flex flex-col items-center gap-2 py-6">
                            <i data-lucide="inbox" class="w-5 h-5" style="color: var(--crb-grey-color); opacity: 0.4"></i>
                            <span style="font-size: 12px; color: var(--crb-grey-color)">No executions found</span>
                        </div>
                    </div>
                    <!-- Footer: See All -->
                    <div style="padding: 6px 8px; border-top: 1px solid var(--crb-grey-light-color)">
                        <a :href="'TestCaseExecutionList.jsp?test=' + encodeURIComponent(exe.test || '') + '&TestCase=' + encodeURIComponent(exe.testcase || exe.testCase || '')"
                           class="flex items-center justify-center gap-1.5 w-full py-1.5 rounded-lg text-[11px] font-semibold transition-colors"
                           style="color: var(--crb-blue-color); background: color-mix(in srgb, var(--crb-blue-color) 5%, transparent)"
                           @mouseenter="$el.style.background = 'color-mix(in srgb, var(--crb-blue-color) 12%, transparent)'"
                           @mouseleave="$el.style.background = 'color-mix(in srgb, var(--crb-blue-color) 5%, transparent)'">
                            <i data-lucide="external-link" class="w-3 h-3"></i>
                            See All Executions
                        </a>
                    </div>
                </div>
            </div>

            <!-- More actions -->
            <div x-data="{ moreOpen: false }" class="relative shrink-0" @click.outside="moreOpen = false">
                <button @click="moreOpen = !moreOpen; $nextTick(() => { if(moreOpen) { let r=$el.getBoundingClientRect(); let dd=$el.nextElementSibling; dd.style.top=(r.bottom+4)+'px'; dd.style.right=(window.innerWidth-r.right)+'px'; } })"
                        class="inline-flex items-center justify-center h-8 w-8 rounded-lg border border-slate-200 dark:border-slate-700
                               text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                    <i data-lucide="more-horizontal" class="w-4 h-4"></i>
                </button>
                <div x-show="moreOpen" x-cloak x-transition
                     class="fixed z-[9999] w-56 rounded-xl border border-slate-200 dark:border-slate-700
                            bg-white dark:bg-slate-800 shadow-lg p-1">
                    <button class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-xs text-slate-700 dark:text-slate-300
                                   hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="window.open('TestCaseScriptV2.jsp?test=' + encodeURIComponent(exe.test) + '&testcase=' + encodeURIComponent(exe.testcase || exe.testCase), '_blank'); moreOpen = false">
                        <i data-lucide="file-code" class="w-3.5 h-3.5"></i> Edit Test Case Script
                    </button>
                    <button class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-xs text-slate-700 dark:text-slate-300
                                   hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="if(typeof openModalTestCase === 'function') openModalTestCase(exe.test, exe.testcase || exe.testCase, 'EDIT', undefined, exe.id); moreOpen = false">
                        <i data-lucide="file-pen" class="w-3.5 h-3.5"></i> Edit Test Case Header
                    </button>
                    <button class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-xs text-slate-700 dark:text-slate-300
                                   hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="if(exe.tag) window.open('ReportingExecutionByTag.jsp?Tag=' + encodeURIComponent(exe.tag), '_blank'); moreOpen = false">
                        <i data-lucide="bar-chart-3" class="w-3.5 h-3.5"></i> Campaign Report
                    </button>
                    <div class="h-px bg-slate-100 dark:bg-slate-700 my-1"></div>
                    <button class="flex items-center gap-2 w-full px-3 py-2 rounded-lg text-xs text-slate-700 dark:text-slate-300
                                   hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
                            @click="createBug(); moreOpen = false"
                            x-show="applicationObj && applicationObj.bugTrackerUrl">
                        <i data-lucide="bug" class="w-3.5 h-3.5"></i> Create Bug
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
