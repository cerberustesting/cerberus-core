<!-- TestCaseExecution V2 - Step List Sidebar -->

<div class="flex flex-col rounded-2xl v2-step-sidebar v2-fade-in"
     style="background: var(--crb-new-bg); border: 1px solid var(--crb-grey-light-color)">

    <!-- Queue mode -->
    <template x-if="mode === 'queue'">
        <div class="flex flex-col py-6 px-4 gap-5">
            <!-- Animated spinner -->
            <div class="flex flex-col items-center gap-3">
                <div class="v2-exe-queue-spinner" style="width: 48px; height: 48px; border-width: 4px"></div>
                <div class="text-center">
                    <div class="text-sm font-bold text-slate-700 dark:text-slate-200">Waiting in Queue</div>
                    <div class="text-[11px] text-slate-400 mt-0.5" x-text="queueInfo ? ('Auto-refresh every 5 seconds') : 'Connecting...'"></div>
                </div>
            </div>

            <!-- Queue info cards -->
            <template x-if="queueInfo">
                <div class="space-y-3">
                    <!-- Position & State -->
                    <div class="rounded-xl p-3" style="background: var(--crb-grey-extra-light-color); border: 1px solid var(--crb-grey-light-color)">
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">Position</div>
                                <div class="text-lg font-black mt-0.5" style="color: var(--crb-blue-color)"
                                     x-text="queueInfo.nbEntryInQueueToGo != null ? queueInfo.nbEntryInQueueToGo : '...'"></div>
                                <div class="text-[9px] text-slate-400" x-text="queueInfo.nbEntryInQueueToGo > 0 ? 'execution(s) ahead' : 'Next in line'"></div>
                            </div>
                            <div>
                                <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">State</div>
                                <div class="inline-flex items-center gap-1.5 mt-1 px-2.5 py-1 rounded-lg text-[11px] font-bold"
                                     :class="{
                                         'bg-blue-100 dark:bg-blue-900/20 text-blue-600': queueInfo.state === 'QUEUED' || queueInfo.state === 'QUWITHDEP',
                                         'bg-amber-100 dark:bg-amber-900/20 text-amber-600': queueInfo.state === 'STARTING' || queueInfo.state === 'WAITING',
                                         'bg-green-100 dark:bg-green-900/20 text-green-600': queueInfo.state === 'EXECUTING',
                                         'bg-red-100 dark:bg-red-900/20 text-red-600': queueInfo.state === 'CANCELLED' || queueInfo.state === 'ERROR',
                                         'bg-purple-100 dark:bg-purple-900/20 text-purple-600': queueInfo.state === 'QUEUED_PAUSED' || queueInfo.state === 'QUWITHDEP_PAUSED',
                                         'bg-slate-100 dark:bg-slate-700 text-slate-500': !queueInfo.state
                                     }"
                                     x-text="queueInfo.state || '-'"></div>
                            </div>
                            <div>
                                <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">Priority</div>
                                <div class="text-lg font-black mt-0.5 text-slate-700 dark:text-slate-300"
                                     x-text="queueInfo.priority != null ? queueInfo.priority : '-'"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Test Case info -->
                    <div class="rounded-xl p-3" style="background: var(--crb-grey-extra-light-color); border: 1px solid var(--crb-grey-light-color)">
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">Test</div>
                                <div class="text-[12px] font-semibold text-slate-700 dark:text-slate-300 mt-0.5 truncate" x-text="queueInfo.test || '-'"></div>
                            </div>
                            <div>
                                <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">TestCase</div>
                                <div class="text-[12px] font-semibold text-slate-700 dark:text-slate-300 mt-0.5 truncate" x-text="queueInfo.testCase || '-'"></div>
                            </div>
                            <div>
                                <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">Country</div>
                                <div class="text-[12px] text-slate-600 dark:text-slate-400 mt-0.5" x-text="queueInfo.country || '-'"></div>
                            </div>
                            <div>
                                <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">Environment</div>
                                <div class="text-[12px] text-slate-600 dark:text-slate-400 mt-0.5" x-text="queueInfo.environment || '-'"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Tag & Comment -->
                    <template x-if="queueInfo.tag || queueInfo.comment">
                        <div class="rounded-xl p-3" style="background: var(--crb-grey-extra-light-color); border: 1px solid var(--crb-grey-light-color)">
                            <template x-if="queueInfo.tag">
                                <div class="mb-2">
                                    <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">Tag</div>
                                    <div class="text-[12px] font-mono text-slate-600 dark:text-slate-400 mt-0.5 truncate" x-text="queueInfo.tag"></div>
                                </div>
                            </template>
                            <template x-if="queueInfo.comment">
                                <div>
                                    <div class="text-[9px] font-bold uppercase tracking-wider" style="color: var(--crb-grey-color)">Comment</div>
                                    <div class="text-[11px] text-slate-500 dark:text-slate-400 mt-0.5 leading-relaxed" x-text="queueInfo.comment"></div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <!-- Queue ID + Last Refresh -->
                    <div class="flex items-center justify-between px-1">
                        <span class="text-[10px] font-mono text-slate-400"
                              x-text="'Queue ID: #' + (queueInfo.id || '-')"></span>
                        <span class="text-[10px] text-slate-400"
                              x-text="'Last refresh: ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'})"></span>
                    </div>

                    <!-- Action buttons -->
                    <div class="flex flex-col gap-2">
                        <button @click="openModalTestCaseExecutionQueue(queueInfo.id, 'EDIT')"
                                class="w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-[12px] font-semibold transition-all"
                                style="background: color-mix(in srgb, var(--crb-blue-color) 10%, transparent); color: var(--crb-blue-color); border: 1px solid color-mix(in srgb, var(--crb-blue-color) 20%, transparent)"
                                @mouseenter="$el.style.background = 'color-mix(in srgb, var(--crb-blue-color) 18%, transparent)'"
                                @mouseleave="$el.style.background = 'color-mix(in srgb, var(--crb-blue-color) 10%, transparent)'">
                            <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
                            Edit Queue Entry
                        </button>
                        <div class="grid grid-cols-2 gap-2">
                            <button @click="_loadQueue(queueInfo.id)"
                                    class="flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl text-[11px] font-semibold transition-all"
                                    style="background: var(--crb-grey-extra-light-color); color: var(--crb-grey-color); border: 1px solid var(--crb-grey-light-color)"
                                    @mouseenter="$el.style.borderColor = 'var(--crb-grey-color)'"
                                    @mouseleave="$el.style.borderColor = 'var(--crb-grey-light-color)'">
                                <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                                Refresh
                            </button>
                            <button @click="if(confirm('Cancel this queue entry?')) { $.ajax({ url: 'UpdateTestCaseExecutionQueue', method: 'POST', data: { id: queueInfo.id, actionState: 'toCANCELLED', actionSave: '' }, success: function() { _loadQueue(queueInfo.id); } }); }"
                                    class="flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl text-[11px] font-semibold transition-all"
                                    style="background: color-mix(in srgb, var(--crb-red-color) 8%, transparent); color: var(--crb-red-color); border: 1px solid color-mix(in srgb, var(--crb-red-color) 15%, transparent)"
                                    @mouseenter="$el.style.background = 'color-mix(in srgb, var(--crb-red-color) 15%, transparent)'"
                                    @mouseleave="$el.style.background = 'color-mix(in srgb, var(--crb-red-color) 8%, transparent)'"
                                    x-show="queueInfo.state === 'QUEUED' || queueInfo.state === 'QUWITHDEP' || queueInfo.state === 'QUEUED_PAUSED' || queueInfo.state === 'QUWITHDEP_PAUSED' || queueInfo.state === 'WAITING'">
                                <i data-lucide="x-circle" class="w-3 h-3"></i>
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Loading state -->
            <template x-if="!queueInfo">
                <div class="flex items-center justify-center gap-2 text-[11px] text-slate-400">
                    <i data-lucide="loader-2" class="w-3.5 h-3.5 v2-exe-spin-limited"></i>
                    Loading queue information...
                </div>
            </template>
        </div>
    </template>

    <!-- Execution mode -->
    <template x-if="mode === 'execution'">
        <div class="flex flex-col" style="height: 100%">

            <!-- Sidebar Header (like ScriptV2) -->
            <div class="flex items-center justify-between px-4 py-3 shrink-0" style="border-bottom: 1px solid var(--crb-grey-light-color)">
                <span class="text-xs font-semibold uppercase tracking-wider" style="color: var(--crb-dark-color)">Steps</span>
                <span class="text-xs font-medium" style="color: var(--crb-grey-color)"
                      x-text="steps.length + ' steps'"></span>
            </div>

            <!-- Pre-Testing Steps -->
            <template x-if="preSteps.length > 0">
                <div class="px-2 pt-2">
                    <div class="v2-exe-step-section">
                        <i data-lucide="shield-check" class="w-3 h-3"></i>
                        <span>Pre Testing</span>
                        <span class="text-[10px] opacity-50" x-text="preSteps.length"></span>
                    </div>
                    <ul class="space-y-0.5 list-none m-0 p-0">
                        <template x-for="(step, idx) in preSteps" :key="step._uid">
                            <li class="v2-fade-in v2-step-item flex items-center gap-2 px-2.5 py-2 rounded-xl cursor-pointer transition-all duration-150"
                                :class="{ 'v2-step-item--active': steps.indexOf(step) === activeStepIndex }"
                                @click="selectStep(steps.indexOf(step))">
                                <!-- Status dot -->
                                <span class="w-2.5 h-2.5 rounded-full shrink-0 transition-colors"
                                      :class="{
                                          'bg-green-500': step.returnCode === 'OK',
                                          'bg-red-500': step.returnCode === 'KO',
                                          'bg-amber-500': step.returnCode === 'FA',
                                          'bg-blue-500 v2-exe-status-pulse': step.returnCode === 'PE',
                                          'bg-slate-300 dark:bg-slate-600': !step.returnCode || ['NE','NA','WE','CA','QU'].includes(step.returnCode)
                                      }"></span>
                                <!-- Number badge (using ScriptV2 classes) -->
                                <div class="v2-step-badge shrink-0"
                                     :class="steps.indexOf(step) === activeStepIndex ? 'v2-step-badge--active' : ''"
                                     x-text="step.sort"></div>
                                <!-- Content (2 lines like ScriptV2) -->
                                <div class="flex-1 min-w-0">
                                    <div class="text-xs font-medium truncate" style="color: var(--crb-dark-color)"
                                         x-text="step.description || 'Step ' + step.sort"></div>
                                    <div class="flex items-center gap-1.5 mt-0.5">
                                        <span class="text-[10px]" style="color: var(--crb-grey-color)"
                                              x-text="(step.actions ? step.actions.length : 0) + ' act.'"></span>
                                        <span class="text-[10px]" style="color: var(--crb-grey-color)"
                                              x-text="formatDuration(step.start, step.end)"></span>
                                    </div>
                                </div>
                                <!-- KO count badge -->
                                <template x-if="step._nbActionsKO > 0 || step._nbControlsKO > 0">
                                    <span class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[9px] font-bold bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400"
                                          x-text="step._nbActionsKO + step._nbControlsKO"></span>
                                </template>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

            <!-- Main Steps -->
            <div class="flex-1 overflow-y-auto overflow-x-visible px-2 py-2">
                <template x-if="preSteps.length > 0 || postSteps.length > 0">
                    <div class="v2-exe-step-section">
                        <i data-lucide="layers" class="w-3 h-3"></i>
                        <span>Steps</span>
                        <span class="text-[10px] opacity-50" x-text="mainSteps.length"></span>
                    </div>
                </template>
                <ul class="v2-step-list space-y-0.5 list-none m-0 p-0" style="max-height: calc(100vh - 340px); overflow-y: auto">
                    <template x-for="(step, idx) in mainSteps" :key="step._uid">
                        <li class="v2-fade-in v2-step-item flex items-center gap-2 px-2.5 py-2 rounded-xl cursor-pointer transition-all duration-150"
                            :class="{ 'v2-step-item--active': steps.indexOf(step) === activeStepIndex }"
                            @click="selectStep(steps.indexOf(step))">
                            <span class="w-2.5 h-2.5 rounded-full shrink-0 transition-colors"
                                  :class="{
                                      'bg-green-500': step.returnCode === 'OK',
                                      'bg-red-500': step.returnCode === 'KO',
                                      'bg-amber-500': step.returnCode === 'FA',
                                      'bg-blue-500 v2-exe-status-pulse': step.returnCode === 'PE',
                                      'bg-slate-300 dark:bg-slate-600': !step.returnCode || ['NE','NA','WE','CA','QU'].includes(step.returnCode)
                                  }"></span>
                            <div class="v2-step-badge shrink-0"
                                 :class="steps.indexOf(step) === activeStepIndex ? 'v2-step-badge--active' : ''"
                                 x-text="step.sort"></div>
                            <div class="flex-1 min-w-0">
                                <div class="text-xs font-medium truncate" style="color: var(--crb-dark-color)"
                                     x-text="step.description || 'Step ' + step.sort"></div>
                                <div class="flex items-center gap-1.5 mt-0.5">
                                    <span class="text-[10px]" style="color: var(--crb-grey-color)"
                                          x-text="(step.actions ? step.actions.length : 0) + ' act.'"></span>
                                    <span class="text-[10px]" style="color: var(--crb-grey-color)"
                                          x-text="formatDuration(step.start, step.end)"></span>
                                </div>
                            </div>
                            <template x-if="step._nbActionsKO > 0 || step._nbControlsKO > 0">
                                <span class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[9px] font-bold bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400"
                                      x-text="step._nbActionsKO + step._nbControlsKO"></span>
                            </template>
                        </li>
                    </template>
                </ul>
            </div>

            <!-- Post-Testing Steps -->
            <template x-if="postSteps.length > 0">
                <div class="px-2 pb-2">
                    <div class="v2-exe-step-section">
                        <i data-lucide="shield-off" class="w-3 h-3"></i>
                        <span>Post Testing</span>
                        <span class="text-[10px] opacity-50" x-text="postSteps.length"></span>
                    </div>
                    <ul class="space-y-0.5 list-none m-0 p-0">
                        <template x-for="(step, idx) in postSteps" :key="step._uid">
                            <li class="v2-fade-in v2-step-item flex items-center gap-2 px-2.5 py-2 rounded-xl cursor-pointer transition-all duration-150"
                                :class="{ 'v2-step-item--active': steps.indexOf(step) === activeStepIndex }"
                                @click="selectStep(steps.indexOf(step))">
                                <span class="w-2.5 h-2.5 rounded-full shrink-0 transition-colors"
                                      :class="{
                                          'bg-green-500': step.returnCode === 'OK',
                                          'bg-red-500': step.returnCode === 'KO',
                                          'bg-amber-500': step.returnCode === 'FA',
                                          'bg-blue-500 v2-exe-status-pulse': step.returnCode === 'PE',
                                          'bg-slate-300 dark:bg-slate-600': !step.returnCode || ['NE','NA','WE','CA','QU'].includes(step.returnCode)
                                      }"></span>
                                <div class="v2-step-badge shrink-0"
                                     :class="steps.indexOf(step) === activeStepIndex ? 'v2-step-badge--active' : ''"
                                     x-text="step.sort"></div>
                                <div class="flex-1 min-w-0">
                                    <div class="text-xs font-medium truncate" style="color: var(--crb-dark-color)"
                                         x-text="step.description || 'Step ' + step.sort"></div>
                                </div>
                                <template x-if="step._nbActionsKO > 0 || step._nbControlsKO > 0">
                                    <span class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full text-[9px] font-bold bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400"
                                          x-text="step._nbActionsKO + step._nbControlsKO"></span>
                                </template>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

            <!-- Empty state -->
            <template x-if="steps.length === 0 && mode === 'execution'">
                <div class="flex flex-col items-center justify-center py-8 gap-3 flex-1">
                    <!-- Animated waiting state during PE -->
                    <template x-if="exe.controlStatus === 'PE'">
                        <div class="flex flex-col items-center gap-3">
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-blue-50 dark:bg-blue-900/20">
                                <i data-lucide="loader-2" class="w-5 h-5 v2-exe-spin-limited" style="color: var(--crb-blue-color)"></i>
                            </div>
                            <div class="text-center">
                                <div class="text-[12px] font-semibold" style="color: var(--crb-blue-color)">Execution in progress...</div>
                                <div class="text-[10px] text-slate-400 mt-1">Waiting for steps to appear</div>
                            </div>
                        </div>
                    </template>
                    <!-- Static empty state when not PE -->
                    <template x-if="exe.controlStatus !== 'PE'">
                        <div class="flex flex-col items-center gap-3">
                            <div class="w-12 h-12 rounded-xl flex items-center justify-center" style="background: var(--crb-grey-lighter-color)">
                                <i data-lucide="list-tree" class="w-5 h-5" style="color: var(--crb-grey-color)"></i>
                            </div>
                            <span class="text-[12px] text-slate-400">No steps in this execution</span>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </template>
</div>
