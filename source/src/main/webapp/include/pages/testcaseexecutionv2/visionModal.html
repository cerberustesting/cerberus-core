<!-- TestCaseExecution V2 - Vision Modal (Live / Video) -->
<!-- Transversal modal for watching live execution via iframe or replaying video -->

<template x-if="visionModal.open">
    <div class="v2-vision-overlay" @click.self="closeVisionModal()" @keydown.escape.window="closeVisionModal()" x-transition.opacity.duration.200ms>
        <div class="v2-vision-modal" @click.stop
             :style="visionModal.fullscreen ? 'width:100vw;height:100vh;max-width:none;max-height:none;border-radius:0' : ''">

            <!-- Header -->
            <div class="v2-vision-header">
                <div class="flex items-center gap-3">
                    <!-- Mode indicator -->
                    <div class="v2-vision-mode-badge"
                         :class="{
                             'v2-vision-mode--live': visionModal.mode === 'live',
                             'v2-vision-mode--video': visionModal.mode === 'video'
                         }">
                        <span class="v2-vision-mode-dot"
                              :class="visionModal.mode === 'live' ? 'v2-pulse' : ''"></span>
                        <i :data-lucide="visionModal.mode === 'video' ? 'film' : 'monitor-play'"
                           class="w-4 h-4"></i>
                        <span x-text="visionModal.mode === 'video' ? 'Video Replay' : 'Live Execution'"></span>
                    </div>
                    <!-- Execution info -->
                    <span class="text-[11px] text-slate-400 dark:text-slate-500 hidden sm:inline"
                          x-text="'#' + (exe.id || '') + ' — ' + (exe.test || '') + ' / ' + (exe.testcase || exe.testCase || '')"></span>
                </div>

                <div class="flex items-center gap-2">
                    <!-- Take Control: opens control URL in new tab (only during live) -->
                    <template x-if="visionModal.mode === 'live' && exe.remoteControlLiveUrl">
                        <button @click="window.open(exe.remoteControlLiveUrl, '_blank')"
                                class="v2-vision-toolbar-btn"
                                style="background: rgba(139,92,246,0.15); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.3); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;"
                                data-tip="Take remote control of the session">
                            <i data-lucide="monitor-smartphone" class="w-3.5 h-3.5" style="margin-right:4px"></i>
                            Take Control
                        </button>
                    </template>
                    <!-- Open in new tab -->
                    <button @click="window.open(visionModal.url, '_blank')"
                            class="v2-vision-toolbar-btn"
                            data-tip="Open in new tab">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                    </button>
                    <!-- Toggle fullscreen -->
                    <button @click="visionModal.fullscreen = !visionModal.fullscreen"
                            class="v2-vision-toolbar-btn"
                            data-tip="Toggle fullscreen">
                        <i :data-lucide="visionModal.fullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                    </button>
                    <!-- Close -->
                    <button @click="closeVisionModal()"
                            class="v2-vision-close-btn">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Content: iframe for live or video player -->
            <div class="v2-vision-body">
                <!-- Live: iframe — if server blocks embedding, fallback message appears -->
                <template x-if="visionModal.mode === 'live'">
                    <div class="relative w-full h-full">
                        <iframe :src="visionModal.url"
                                class="v2-vision-iframe"
                                allow="autoplay; clipboard-write; clipboard-read"
                                @load="$el.dataset.loaded = 'true'; $el.nextElementSibling && ($el.nextElementSibling.style.display = 'none')"
                                @error="$el.nextElementSibling && ($el.nextElementSibling.style.display = 'flex')"></iframe>
                        <!-- Fallback: shown if iframe is blocked by X-Frame-Options / CSP -->
                        <div class="v2-vision-iframe-fallback"
                             style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:var(--crb-bg-color, #1a1a2e); color:var(--crb-text-color, #e2e8f0); text-align:center; padding:32px;">
                            <i data-lucide="monitor-x" style="width:48px; height:48px; opacity:0.5"></i>
                            <p style="font-size:14px; max-width:400px; line-height:1.6; opacity:0.8">
                                The remote server does not allow embedding in an iframe.<br>
                                Click below to open the live view in a new tab.
                            </p>
                            <button @click="window.open(visionModal.url, '_blank')"
                                    style="background: var(--crb-blue-color, #2c7be5); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                                <i data-lucide="external-link" style="width:16px; height:16px"></i>
                                Open Live View
                            </button>
                        </div>
                    </div>
                </template>

                <!-- Video: native HTML5 player -->
                <template x-if="visionModal.mode === 'video'">
                    <div class="v2-vision-video-container">
                        <video controls autoplay
                               class="v2-vision-video"
                               :src="visionModal.url"
                               :poster="'images/loading_2.gif'">
                            Your browser does not support the video tag.
                        </video>
                        <!-- Multi-part video navigation -->
                        <template x-if="exe.videos && exe.videos.length > 1">
                            <div class="v2-vision-video-parts">
                                <template x-for="(vid, vIdx) in exe.videos" :key="vIdx">
                                    <button @click="visionModal.url = 'ReadTestCaseExecutionMedia?filename=' + encodeURIComponent(vid) + '&filedesc=Video&filetype=MP4'"
                                            class="v2-vision-video-part-btn"
                                            :class="visionModal.url.indexOf(vid) !== -1 ? 'v2-vision-video-part-btn--active' : ''"
                                            x-text="'Part ' + (vIdx + 1) + '/' + exe.videos.length">
                                    </button>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
