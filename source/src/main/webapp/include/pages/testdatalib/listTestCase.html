<!-- Test Case List Modal - Cerberus V2 Design -->
<div x-data="{ open: false, isFullscreen: false }"
     x-show="open"
     x-cloak
     @testcaselist-modal-open.window="open = true; $nextTick(() => { if (window.lucide) lucide.createIcons(); })"
     @testcaselist-modal-close.window="open = false"
     x-init="$watch('open', val => { if (!val) { $('#testCaseListModal').trigger('hidden.bs.modal'); } })"
     class="crb_modal"
     id="testCaseListModal">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-[2px]" @click="open = false"></div>

    <!-- Modal Card -->
    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[900px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl flex items-center justify-center"
                     style="background: color-mix(in srgb, var(--crb-blue-color) 12%, transparent)">
                    <svg class="w-5 h-5" style="color: var(--crb-blue-color)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                </div>
                <div>
                    <h2 class="!text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100" id="testCaseListModalLabel">List of test cases affected by this entry</h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0">Test cases using this data library entry</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <svg x-show="!isFullscreen" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/></svg>
                    <svg x-show="isFullscreen" x-cloak class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7"/></svg>
                </button>
                <button @click="open = false"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <!-- BODY -->
        <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">
            <div id="testCaseListPanel">
                <!-- Total count badge -->
                <div class="flex items-center justify-between mb-4 px-4 py-2.5 rounded-xl border"
                     style="background: color-mix(in srgb, var(--crb-blue-color) 6%, transparent); border-color: color-mix(in srgb, var(--crb-blue-color) 20%, transparent)">
                    <div class="flex items-center gap-2">
                        <svg class="w-4 h-4" style="color: var(--crb-blue-color)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2"/></svg>
                        <span class="text-sm font-semibold" style="color: var(--crb-blue-color)" id="groupTitle">Test cases affected by this entry</span>
                    </div>
                    <span class="text-xs font-bold px-2.5 py-1 rounded-full text-white" style="background: var(--crb-blue-color)" id="totalTestCases"></span>
                </div>
                <!-- Dynamic list populated by JS -->
                <div class="space-y-2" id="testCaseListGroup">
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
            <button type="button" id="closeButton"
                    onclick="window.dispatchEvent(new CustomEvent('testcaselist-modal-close'))"
                    class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Close</button>
        </div>
    </div>
</div>
