<!-- Property Modal - Alpine.js/Tailwind -->
<div x-data="propertyModal()"
     x-show="open"
     x-cloak
     @modalproperty-open.window="handleOpen($event.detail)"
     @modalproperty-close.window="open = false"
     class="crb_modal"
     id="modalProperty">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <!-- Modal Card -->
    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[700px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-purple-500/10 flex items-center justify-center">
                    <i data-lucide="variable" class="w-5 h-5 text-purple-500"></i>
                </div>
                <div>
                    <h5 class="modal-title !text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100">Property</h5>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0">Property definition</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="console.log('close clicked', open); open = false; console.log('closed', open)"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- BODY -->
        <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">
            <div id="firstRowProperty" class="mb-3"></div>
            <div id="secondRowProperty"></div>
        </div>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
            <button type="button" @click="open = false"
                    class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Close</button>
        </div>
    </div>
</div>

<script>
function propertyModal() {
    return {
        open: false,
        isFullscreen: false,
        handleOpen(detail) {
            this.open = true;
            // If property data is passed directly (from ExecutionV2), render it
            if (detail && detail.property) {
                var prop = detail.property;
                this.$nextTick(function() {
                    var row1 = document.getElementById('firstRowProperty');
                    var row2 = document.getElementById('secondRowProperty');
                    if (row1) {
                        row1.innerHTML = '';
                        var fields = [
                            { label: 'Property', value: prop.property || '-' },
                            { label: 'Type', value: prop.type || '-' },
                            { label: 'Value', value: prop.value || '-' },
                            { label: 'Nature', value: prop.nature || '-' },
                            { label: 'Database', value: prop.database || '-' },
                            { label: 'Length', value: prop.length || '-' }
                        ];
                        var html = '<div class="grid grid-cols-2 gap-3">';
                        fields.forEach(function(f) {
                            html += '<div><label class="text-xs font-semibold text-slate-500 dark:text-slate-400">' + f.label + '</label>'
                                  + '<div class="text-sm text-slate-800 dark:text-slate-200 mt-0.5 font-mono break-all">' + (f.value || '-') + '</div></div>';
                        });
                        html += '</div>';
                        row1.innerHTML = html;
                    }
                    if (row2) {
                        row2.innerHTML = '';
                        var fields2 = [
                            { label: 'Value 1 (raw)', value: prop.value1 || '-' },
                            { label: 'Value 1 Init', value: prop.value1Init || '-' },
                            { label: 'Value 2', value: prop.value2 || '-' },
                            { label: 'Value 2 Init', value: prop.value2Init || '-' },
                            { label: 'Return Code', value: prop.returnCode || 'OK' },
                            { label: 'Return Message', value: prop.returnMessage || '-' }
                        ];
                        var html2 = '<div class="grid grid-cols-2 gap-3 mt-3">';
                        fields2.forEach(function(f) {
                            html2 += '<div><label class="text-xs font-semibold text-slate-500 dark:text-slate-400">' + f.label + '</label>'
                                   + '<div class="text-[12px] text-slate-700 dark:text-slate-300 mt-0.5 font-mono break-all">' + (f.value || '-') + '</div></div>';
                        });
                        html2 += '</div>';
                        row2.innerHTML = html2;
                    }
                    if (window.lucide) lucide.createIcons();
                });
            } else {
                this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
            }
        }
    };
}
</script>
