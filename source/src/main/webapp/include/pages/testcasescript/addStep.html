<!-- Add Step Modal - Alpine.js/Tailwind -->
<div x-data="addStepModal()"
     x-show="open"
     x-cloak
     @addstepmodal-open.window="handleOpen($event.detail)"
     @addstepmodal-close.window="open = false"
     class="crb_modal"
     id="addStepModal">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <!-- Modal Card -->
    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[600px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-sky-500/10 flex items-center justify-center">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-sky-500"></i>
                </div>
                <div>
                    <h5 class="!text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100" name="addStepField">Add Step</h5>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0">Create a new step or import from library</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="open = false"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- BODY -->
        <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">

            <!-- Description -->
            <div class="mb-3">
                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="descriptionField">Description</label>
                <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all crb-autocomplete-variable"
                       name="description" id="description" type="text" placeholder="Enter step description...">
            </div>

            <!-- Import Detail (populated dynamically by JS) -->
            <div id="importDetail" style="display: none;" class="mb-3 p-3 rounded-lg border border-sky-200 dark:border-sky-800 bg-sky-50/50 dark:bg-sky-900/20 space-y-2"></div>

            <!-- Import from Library -->
            <div class="rounded-lg border border-slate-200 dark:border-slate-700 p-4">
                <div class="flex items-center gap-2 mb-3">
                    <i data-lucide="library" class="w-4 h-4 text-sky-500"></i>
                    <span class="text-sm font-semibold text-slate-700 dark:text-slate-300" name="importField">Import from Library</span>
                </div>
                <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all mb-3"
                       name="search" id="search" type="text" placeholder="Search library steps...">
                <div class="list-group list-group-root" id="lib" style="max-height: 400px; overflow-y: auto;"
                     ></div>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
            <button type="button" @click="open = false"
                    class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition"
                    name="buttonClose">Close</button>
            <button type="button" id="addStepConfirm"
                    @click="$nextTick(() => { open = false })"
                    class="px-4 py-2 rounded-md bg-blue-400 text-white text-sm hover:bg-blue-700 transition"
                    name="buttonAdd">Add</button>
        </div>
    </div>
</div>

<script>
function addStepModal() {
    return {
        open: false,
        isFullscreen: false,
        handleOpen(detail) {
            this.open = true;
            this.$nextTick(function() {
                if (window.lucide) lucide.createIcons();
                $('#addStepModal').trigger('shown.bs.modal');
            });
        },
        init() {
            this.$watch('open', function(val) {
                if (!val) { $('#addStepModal').trigger('hidden.bs.modal'); }
            });
        }
    };
}
</script>
