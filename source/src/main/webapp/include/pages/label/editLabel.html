<!--Edit label page - Alpine.js/Tailwind refactored -->
<div x-data="editLabelModal()"
     x-show="open"
     x-cloak
     @editlabel-modal-open.window="handleOpen($event.detail)"
     @editlabel-modal-close.window="open = false"
     class="crb_modal"
     id="editLabelModal">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <!-- Modal Card -->
    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[750px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-blue-600/10 flex items-center justify-center">
                    <i data-lucide="tag" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div>
                    <h4 class="!text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100" id="editLabelModalLabel" name="editLabelField">Edit Label</h4>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0">Manage label definition and long description</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-amber-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="open = false"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- TABS -->
        <div class="flex flex-col flex-1 min-h-0">
            <div class="w-full flex bg-slate-200 dark:bg-slate-700 p-1 mx-6 mb-2 rounded-lg shadow-sm h-10" style="width: calc(100% - 3rem);">
                <button type="button" @click="editLabelTab = 'definition'"
                        :class="editLabelTab === 'definition'
                            ? 'bg-slate-50 font-semibold dark:bg-slate-900'
                            : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap"
                        id="tab1LabText" name="tabsLabEdit1">
                    Definition
                </button>
                <button type="button" @click="editLabelTab = 'longdesc'"
                        :class="editLabelTab === 'longdesc'
                            ? 'bg-slate-50 font-semibold dark:bg-slate-900'
                            : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap"
                        id="tab2LabText" name="tabsLabEdit2">
                    Long Description
                </button>
            </div>

            <!-- BODY -->
            <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">
                <form id="editLabelModalForm" name="editLabelModalForm" role="form">

                    <!-- Messages area -->
                    <div id="DialogMessagesArea" class="mb-3">
                        <div class="alert" id="DialogMessagesAlert" style="display:none;">
                            <strong><span class="alert-description" id="DialogAlertDescription"></span></strong>
                            <button type="button" class="close" data-hide="alert" aria-hidden="true">
                                <span class="glyphicon glyphicon-remove alert-right alert-close pull-right"></span>
                            </button>
                        </div>
                    </div>

                    <!-- TAB: Definition -->

                        <!-- Row 1: ID + System + Type -->
                        <div class="flex gap-3 mb-3">
                            <div style="width: 80px; flex-shrink: 0;">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="id" name="idField">ID</label>
                                <input type="text" name="id" id="id" readonly
                                       class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400">
                            </div>
                            <!-- System dropdown -->
                            <div class="flex-1" x-data="labelDropdown({id:'edit_system_dd', hiddenInput:'edit_system', preselectEvent:'edit-label-system-preselect', loader: labelLoaders.invariant('SYSTEM')})" @click.stop>

                                <input type="hidden" id="edit_system" name="system">
                                <div class="relative w-full">

                                             style="z-index: 99999;" :style="posStyle()">

                                            </div>
                                            <div class="max-h-52 overflow-auto">

                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                            <!-- Type dropdown -->

                                                    </template>

                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="reqstatusField">Status</label>
                                    <input type="hidden" id="edit_reqstatus" name="reqstatus">
                                    <div class="relative w-full">

<script>
    function editLabelModal() {
        return {
            open: false,
            isFullscreen: false,
            editLabelTab: 'definition',
            handleOpen: function(detail) {
                this.open = true;
                this.editLabelTab = 'definition';
                this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
            },
            init: function() {
                var self = this;
