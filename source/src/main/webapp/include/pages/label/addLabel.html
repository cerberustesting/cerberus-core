<script>
    function addLabelModal() {
        return {
            open: false,
            isFullscreen: false,
            handleOpen: function(detail) {
                this.open = true;
                this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
            },
            init: function() {
                var self = this;
                this.$watch('open', function(val) {
                    if (!val && typeof addEntryModalCloseHandler === 'function') {
                        addEntryModalCloseHandler();
                    }
                });
                this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
            }
        };
    }
</script>

<!-- Shared labelDropdown component + loaders (used by both add and edit label modals) -->
<script>
    function labelDropdown(config) {
        return {
            id: config.id || 'dropdown',
            hiddenInput: config.hiddenInput || config.id,
            isOpen: false,
            items: [],
            selectedValue: '',
            selectedLabel: '',
            search: '',
            pos: { top: 0, left: 0, width: 0, bottom: 0 },
            openUp: false,

            init: function() {
                var self = this;
                if (config.loader) {
                    config.loader(function(items) { self.items = items; });
                }
                if (config.preselectEvent) {
                    window.addEventListener(config.preselectEvent, function(e) {
                        self.preselect(e.detail);
                    });
                }
                window.addEventListener('label-dropdown-close-all', function(e) {
                    if (e.detail !== self.id) self.isOpen = false;
                });
                document.addEventListener('click', function(e) {
                    if (!self.isOpen) return;
                    var btn = document.getElementById(self.id + '-btn');
                    if (btn && btn.contains(e.target)) return;
                    if (e.target.closest && e.target.closest('[x-show="isOpen"]')) return;
                    self.isOpen = false;
                }, true);
            },

            preselect: function(value) {
                this.selectedValue = value || '';
                var match = null;
                for (var i = 0; i < this.items.length; i++) {
                    if (this.items[i].value === value) { match = this.items[i]; break; }
                }
                this.selectedLabel = match ? match.label : (value || '');
                var input = document.getElementById(this.hiddenInput);
                if (input) input.value = value || '';
            },

            toggle: function() {
                this.isOpen = !this.isOpen;
                if (this.isOpen) {
                    window.dispatchEvent(new CustomEvent('label-dropdown-close-all', { detail: this.id }));
                    this.updatePosition();
                }
            },

            updatePosition: function() {
                var btn = document.getElementById(this.id + '-btn');
                if (!btn) return;
                var rect = btn.getBoundingClientRect();
                var dropdownHeight = 260;
                var spaceBelow = window.innerHeight - rect.bottom;
                if (spaceBelow < dropdownHeight && rect.top > dropdownHeight) {
                    this.openUp = true;
                    this.pos.bottom = window.innerHeight - rect.top + 4;
                } else {
                    this.openUp = false;
                    this.pos.top = rect.bottom + 4;
                }
                this.pos.left = rect.left;
                this.pos.width = Math.max(rect.width, 200);
            },

            posStyle: function() {
                var base = 'z-index: 99999; left: ' + this.pos.left + 'px; width: ' + this.pos.width + 'px;';
                if (this.openUp) {
                    return base + ' bottom: ' + this.pos.bottom + 'px; top: auto;';
                }
                return base + ' top: ' + this.pos.top + 'px;';
            },

            filtered: function() {
                var q = this.search.toLowerCase();
                if (!q) return this.items;
                return this.items.filter(function(i) { return i.label.toLowerCase().indexOf(q) !== -1; });
            },

            select: function(item) {
                this.selectedValue = item.value;
                this.selectedLabel = item.label;
                this.isOpen = false;
                this.search = '';
                var input = document.getElementById(this.hiddenInput);
                if (input) {
                    input.value = item.value;
                    $(input).trigger('change');
                }
                if (config.onSelect) config.onSelect(item);
            }
        };
    }

    var labelLoaders = {
        invariant: function(idName) {
            return function(callback) {
                var cacheKey = 'INVARIANT_' + idName;
                var cached = sessionStorage.getItem(cacheKey);
                if (cached) {
                    var list = JSON.parse(cached);
                    callback(list.map(function(el) {
                        return { value: el.value, label: el.value + (el.description ? ' - ' + el.description : '') };
                    }));
                    return;
                }
                $.ajax({
                    url: 'FindInvariantByID',
                    data: { idName: idName },
                    success: function(data) {
                        sessionStorage.setItem(cacheKey, JSON.stringify(data));
                        callback(data.map(function(el) {
                            return { value: el.value, label: el.value + (el.description ? ' - ' + el.description : '') };
                        }));
                    },
                    error: function() { callback([]); }
                });
            };
        }
    };
</script>
