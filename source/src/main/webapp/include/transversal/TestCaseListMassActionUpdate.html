<!-- MASS UPDATE MODAL -->
<div
    x-data="massUpdateModal()"
    x-show="open"
    x-cloak
    @mass-update-open.window="openModal()"
    class="crb_modal"
    id="massActionTestCaseModal">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60" @click="close()"></div>

    <!-- Modal Card -->
    <div class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10 crb_card w-full max-w-3xl rounded-2xl"
         style="max-height: calc(100vh - 4rem); margin: 2rem 1rem;"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-blue-600/10 flex items-center justify-center">
                    <i data-lucide="pen-line" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div>
                    <h2 class="!text-lg !font-semibold !mb-0 !mt-0">Mass Update</h2>
                    <p class="text-xs text-slate-500 !mb-0">Update multiple test cases at once</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="close()"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- SCROLLABLE BODY -->
        <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">
            <form id="massActionTestCaseModalFormUpdate" class="space-y-0">

                <!-- Section: Fields -->
                <div class="rounded-lg border border-slate-200 dark:border-slate-700 p-4 mt-3">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="settings" class="w-4 h-4 text-blue-600"></i>
                        <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Fields to update</span>
                    </div>

                    <div class="space-y-4">

                        <!-- STATUS -->
                        <div class="flex items-center gap-3">
                            <input id="massStatusCheck" type="checkbox" x-model="enabledFields.status"
                                   class="w-4 h-4 accent-blue-600 cursor-pointer shrink-0">
                            <label for="massStatusCheck" class="text-sm font-medium text-slate-600 dark:text-slate-400 w-28 shrink-0 cursor-pointer">Status</label>
                            <div class="flex-1 min-w-0" x-data="crbDropdown({id:'massStatus', hiddenInput:'massStatus', loader: crbLoaders.invariant('TCSTATUS')})" @click.stop>
                                <div class="relative w-full">
                                    <div @click.stop="toggle()" :id="id + '-btn'"
                                         class="flex h-10 items-center justify-between w-full rounded-md border px-3 py-2 text-sm gap-2 cursor-pointer select-none dark:bg-slate-800 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700 bg-white border-slate-300 text-slate-900 hover:bg-slate-100 transition-all"
                                         :class="!$data.enabledFields?.status && 'opacity-40 pointer-events-none'">
                                        <span x-text="selectedLabel || '-- Select --'" class="truncate"></span>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 transition-transform duration-200" :class="isOpen ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                                    </div>
                                    <template x-teleport="body">
                                        <div x-show="isOpen" @click.away="isOpen = false" x-transition
                                             class="crb-dropdown-panel fixed rounded-md border shadow-lg bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 max-h-64 overflow-hidden"
                                              :style="{ top: pos.top + 'px', left: pos.left + 'px', width: pos.width + 'px' }">
                                            <div class="p-2 border-b dark:border-slate-700 border-slate-200">
                                                <input x-model="search" type="text" placeholder="Search..." @keydown.escape.stop="isOpen = false"
                                                       class="w-full text-sm border rounded px-2 py-1 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-300 bg-white border-slate-300 text-slate-900">
                                            </div>
                                            <div class="max-h-52 overflow-auto">
                                                <template x-for="item in filtered()" :key="item.value">
                                                    <button type="button" @click.stop="select(item)"
                                                            class="w-full text-left px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition"
                                                            :class="item.value === selectedValue ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : ''">
                                                        <span x-text="item.label"></span>
                                                    </button>
                                                </template>
                                                <template x-if="filtered().length === 0">
                                                    <div class="px-3 py-2 text-sm text-slate-400 italic">No results</div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <input type="hidden" id="massStatus" name="massStatus">
                            </div>
                        </div>

                        <!-- APPLICATION -->
                        <div class="flex items-center gap-3">
                            <input id="massApplicationCheck" type="checkbox" x-model="enabledFields.application"
                                   class="w-4 h-4 accent-blue-600 cursor-pointer shrink-0">
                            <label for="massApplicationCheck" class="text-sm font-medium text-slate-600 dark:text-slate-400 w-28 shrink-0 cursor-pointer">Application</label>
                            <div class="flex-1 min-w-0" x-data="crbDropdown({id:'massApplication', hiddenInput:'massApplication', loader: crbLoaders.applications})" @click.stop>
                                <div class="relative w-full">
                                    <div @click.stop="toggle()" :id="id + '-btn'"
                                         class="flex h-10 items-center justify-between w-full rounded-md border px-3 py-2 text-sm gap-2 cursor-pointer select-none dark:bg-slate-800 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700 bg-white border-slate-300 text-slate-900 hover:bg-slate-100 transition-all"
                                         :class="!$data.enabledFields?.application && 'opacity-40 pointer-events-none'">
                                        <span x-text="selectedLabel || '-- Select --'" class="truncate"></span>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 transition-transform duration-200" :class="isOpen ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                                    </div>
                                    <template x-teleport="body">
                                        <div x-show="isOpen" @click.away="isOpen = false" x-transition
                                             class="crb-dropdown-panel fixed rounded-md border shadow-lg bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 max-h-64 overflow-hidden"
                                              :style="{ top: pos.top + 'px', left: pos.left + 'px', width: pos.width + 'px' }">
                                            <div class="p-2 border-b dark:border-slate-700 border-slate-200">
                                                <input x-model="search" type="text" placeholder="Search..." @keydown.escape.stop="isOpen = false"
                                                       class="w-full text-sm border rounded px-2 py-1 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-300 bg-white border-slate-300 text-slate-900">
                                            </div>
                                            <div class="max-h-52 overflow-auto">
                                                <template x-for="item in filtered()" :key="item.value">
                                                    <button type="button" @click.stop="select(item)"
                                                            class="w-full text-left px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition"
                                                            :class="item.value === selectedValue ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : ''">
                                                        <span x-text="item.label"></span>
                                                    </button>
                                                </template>
                                                <template x-if="filtered().length === 0">
                                                    <div class="px-3 py-2 text-sm text-slate-400 italic">No results</div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <input type="hidden" id="massApplication" name="massApplication">
                            </div>
                        </div>

                        <!-- PRIORITY -->
                        <div class="flex items-center gap-3">
                            <input id="massPriorityCheck" type="checkbox" x-model="enabledFields.priority"
                                   class="w-4 h-4 accent-blue-600 cursor-pointer shrink-0">
                            <label for="massPriorityCheck" class="text-sm font-medium text-slate-600 dark:text-slate-400 w-28 shrink-0 cursor-pointer">Priority</label>
                            <div class="flex-1 min-w-0" x-data="crbDropdown({id:'massPriority', hiddenInput:'massPriority', loader: crbLoaders.invariant('PRIORITY')})" @click.stop>
                                <div class="relative w-full">
                                    <div @click.stop="toggle()" :id="id + '-btn'"
                                         class="flex h-10 items-center justify-between w-full rounded-md border px-3 py-2 text-sm gap-2 cursor-pointer select-none dark:bg-slate-800 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700 bg-white border-slate-300 text-slate-900 hover:bg-slate-100 transition-all"
                                         :class="!$data.enabledFields?.priority && 'opacity-40 pointer-events-none'">
                                        <span x-text="selectedLabel || '-- Select --'" class="truncate"></span>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0 transition-transform duration-200" :class="isOpen ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                                    </div>
                                    <template x-teleport="body">
                                        <div x-show="isOpen" @click.away="isOpen = false" x-transition
                                             class="crb-dropdown-panel fixed rounded-md border shadow-lg bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 max-h-64 overflow-hidden"
                                              :style="{ top: pos.top + 'px', left: pos.left + 'px', width: pos.width + 'px' }">
                                            <div class="p-2 border-b dark:border-slate-700 border-slate-200">
                                                <input x-model="search" type="text" placeholder="Search..." @keydown.escape.stop="isOpen = false"
                                                       class="w-full text-sm border rounded px-2 py-1 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-300 bg-white border-slate-300 text-slate-900">
                                            </div>
                                            <div class="max-h-52 overflow-auto">
                                                <template x-for="item in filtered()" :key="item.value">
                                                    <button type="button" @click.stop="select(item)"
                                                            class="w-full text-left px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition"
                                                            :class="item.value === selectedValue ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : ''">
                                                        <span x-text="item.label"></span>
                                                    </button>
                                                </template>
                                                <template x-if="filtered().length === 0">
                                                    <div class="px-3 py-2 text-sm text-slate-400 italic">No results</div>
                                                </template>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <input type="hidden" id="massPriority" name="massPriority">
                            </div>
                        </div>

                        <!-- EXECUTOR (text input) -->
                        <div class="flex items-center gap-3">
                            <input id="massExecutorCheck" type="checkbox" x-model="enabledFields.executor"
                                   class="w-4 h-4 accent-blue-600 cursor-pointer shrink-0">
                            <label for="massExecutorCheck" class="text-sm font-medium text-slate-600 dark:text-slate-400 w-28 shrink-0 cursor-pointer">Executor</label>
                            <div class="flex-1 min-w-0">
                                <input id="massExecutor" type="text" name="massExecutor" x-model="executorValue"
                                       :disabled="!enabledFields.executor"
                                       class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                            </div>
                        </div>

                    </div>
                </div>

            </form>
        </div>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
            <button type="button" @click="close()" class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Cancel</button>
            <button type="button" id="massActionUpdate" @click="submit()" class="px-4 py-2 rounded-md bg-sky-400 text-white text-sm hover:bg-sky-500 transition">Update</button>
        </div>

    </div>
</div>
<script>
    function massUpdateModal() {
        return {
            open: false,
            loading: false,
            executorValue: '',
            enabledFields: {
                status: false,
                application: false,
                priority: false,
                executor: false
            },

            /* ---------------- lifecycle ---------------- */

            openModal() {
                this.open = true;
                this.$nextTick(() => {
                    if (window.lucide) lucide.createIcons();
                });
            },

            close() {
                this.open = false;
                this.reset();
            },

            reset() {
                this.enabledFields = { status: false, application: false, priority: false, executor: false };
                this.executorValue = '';
                this.loading = false;
            },

            /* ---------------- submit ---------------- */

            submit() {
                if (this.loading)
                    return;

                clearResponseMessage($('#massActionTestCaseModal'));

                const params = new URLSearchParams();

                // Collect enabled fields from hidden inputs (crbDropdown) or text input
                if (this.enabledFields.status) {
                    var v = document.getElementById('massStatus');
                    if (v && v.value) params.append('massStatus', v.value);
                }
                if (this.enabledFields.application) {
                    var v = document.getElementById('massApplication');
                    if (v && v.value) params.append('massApplication', v.value);
                }
                if (this.enabledFields.priority) {
                    var v = document.getElementById('massPriority');
                    if (v && v.value) params.append('massPriority', v.value);
                }
                if (this.enabledFields.executor && this.executorValue) {
                    params.append('massExecutor', this.executorValue);
                }

                const formListParams = $('#massActionForm')
                        .serialize()
                        .replace(/=on/g, '')
                        .replace(/test-/g, 'test=')
                        .replace(/testcase-/g, '&testcase=');

                this.loading = true;
                showLoaderInModal('#massActionTestCaseModal');

                $.post("UpdateTestCaseMass", params.toString() + "&" + formListParams, "json")
                        .done(data => {
                            if (["success", "warning"].includes(getAlertType(data.messageType))) {
                                $('#testCaseTable').DataTable().draw();
                                $("#selectAll").prop("checked", false);
                                showMessage(data);
                                this.close();
                            } else {
                                showMessage(data, $('#massActionTestCaseModal'));
                            }
                        })
                        .fail(() => handleErrorAjaxAfterTimeout())
                        .always(() => {
                            hideLoaderInModal('#massActionTestCaseModal');
                            this.loading = false;
                        });
            }
        }
    }

    // loadInvariantList kept for backward compat with other callers
    function loadInvariantList(idName, forceReload = false) {
        const cacheKey = "INVARIANT_" + idName;
        if (forceReload) sessionStorage.removeItem(cacheKey);
        const cached = sessionStorage.getItem(cacheKey);
        if (cached) return Promise.resolve(JSON.parse(cached));
        return new Promise((resolve, reject) => {
            $.ajax({
                url: "FindInvariantByID",
                data: {idName},
                success: data => { sessionStorage.setItem(cacheKey, JSON.stringify(data)); resolve(data); },
                error: reject
            });
        });
    }
</script>
