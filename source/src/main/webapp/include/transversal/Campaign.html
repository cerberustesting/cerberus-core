<!--Edit testcampaign page - Alpine/Tailwind refactored -->
<div x-data="campaignModal()"
     x-show="open"
     x-cloak
     @campaign-modal-open.window="handleOpen($event.detail)"
     @campaign-modal-close.window="open = false"
     class="crb_modal"
     id="editTestcampaignModal">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <!-- Modal Card -->
    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[1050px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-blue-600/10 flex items-center justify-center">
                    <i data-lucide="flag" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div>
                    <h4 class="!text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100" id="editTestcampaignModalLabel" name="editTestcampaignField">Campaign</h4>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0">Manage campaign configuration, test scope & scheduling</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="open = false"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

                <!-- Campaign Name field (always visible) -->
                <form id="editTestcampaignModalForm" name="editTestcampaignModalForm" role="form" style="display:contents;">
                <div class="px-6 pt-3 pb-2 shrink-0">
                    <div class="flex gap-3">
                        <div class="flex-1">
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="campaign" name="campaignField">Campaign</label>
                            <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="campaign" id="campaign">
                            <input type="text" name="originalCampaign" id="originalCampaign" style="display:none;"/>
                        </div>
                    </div>
                </div>

                <!-- Hidden fields -->
                <input type="hidden" id="campaignKey" name="campaignKey" value="" />
                <input type="hidden" name="id" id="id">

                <!-- TABS -->
                <div class="flex flex-col flex-1 min-h-0">
                <div class="w-full flex bg-slate-200 dark:bg-slate-700 p-1 mx-6 mb-2 rounded-lg shadow-sm h-10" style="width: calc(100% - 3rem);">
                    <template x-for="t in [
                        {id:'description', label:'Description', name:'tabDescription'},
                        {id:'testcases', label:'TestCase List', name:'tabTCList'},
                        {id:'envs', label:'Env / Countries / Robots', name:'tabEnv'},
                        {id:'settings', label:'Exec Settings', name:'tabParameters'},
                        {id:'scheduler', label:'Scheduler', name:'tabsEdit8'},
                        {id:'notifs', label:'Notifications', name:'tabNotification'},
                        {id:'advanced', label:'Advanced', name:'tabAdvanced'},
                        {id:'trace', label:'Traceability', name:'tabsEdit5'}
                    ]" :key="t.id">
                        <button type="button" @click="campTab = t.id"
                                :class="campTab === t.id
                                    ? 'bg-slate-50 font-semibold dark:bg-slate-900'
                                    : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                                class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap"
                                :id="'createTab' + t.name + 'Text'" :name="t.name"
                                x-text="t.label">
                        </button>
                    </template>
                </div>

                <!-- BODY -->
                <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">

                        <!-- Messages area -->
                        <div id="DialogMessagesArea" class="mb-3">
                            <div class="alert" id="DialogMessagesAlert" style="display:none;">
                                <strong><span class="alert-description" id="DialogAlertDescription"></span></strong>
                                <button type="button" class="close" data-hide="alert" aria-hidden="true">
                                    <span class="glyphicon glyphicon-trash alert-right alert-close pull-right"></span>
                                </button>
                            </div>
                        </div>

                        <!-- TAB: Description -->
                        <div x-show="campTab === 'description'" id="tabsCreate-1">
                            <div class="mb-3">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="descriptionField">Description</label>
                                <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="description" id="description"/>
                            </div>
                            <div class="flex gap-3 mb-3">
                                <div class="w-1/2">
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="cIScoreThresholdField">CI Score Threshold</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="cIScoreThreshold" id="cIScoreThreshold"/>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="longDescriptionField">Long Description</label>
                                <textarea class="form-control wysiwyg" name="longDescription" id="longDescription"></textarea>
                            </div>
                        </div>

                        <!-- TAB: TestCase List -->
                        <div x-show="campTab === 'testcases'" id="tabsCreate-6">
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-2" name="labelTCField" id="labelField">Define the TestCase scope from Labels and criterias.</label>

                            <!-- Sub-tabs: Label List / Test Case Criterias -->
                            <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-lg mb-3">
                                <button type="button" @click="labelSubTab = 'labels'"
                                        :class="labelSubTab === 'labels'
                                            ? 'bg-white dark:bg-slate-900 font-semibold shadow-sm text-slate-900 dark:text-slate-100'
                                            : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white'"
                                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-sm"
                                        id="editLTab1Text" name="tabLabelS">
                                    Label List
                                </button>
                                <button type="button" @click="labelSubTab = 'criterias'"
                                        :class="labelSubTab === 'criterias'
                                            ? 'bg-white dark:bg-slate-900 font-semibold shadow-sm text-slate-900 dark:text-slate-100'
                                            : 'text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white'"
                                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-sm"
                                        id="editLTab2Text" name="tabLabelR">
                                    Test Case Criterias
                                </button>
                            </div>

                            <div x-show="labelSubTab === 'labels'" id="tabsCreate-4">
                                <div id="labelTestcampaignList">
                                    <table id="labelTestcampaignsTable" class="table table-hover display" name="labelTestcampaignsTable"></table>
                                    <div class="mb-5"></div>
                                </div>
                            </div>
                            <div x-show="labelSubTab === 'criterias'" id="tabsCreate-5">
                                <div id="parameterTestcaseList">
                                    <table id="parameterTestcaseTable" class="table table-hover display" name="parameterTestcaseTable"></table>
                                    <div class="mb-5"></div>
                                </div>
                            </div>
                        </div>

                        <!-- TAB: Environments, Countries & Robots -->
                        <div x-show="campTab === 'envs'" id="tabsCreate-3">
                            <div id="parameterTestcampaignList">
                                <table id="parameterTestcampaignsTable" class="table table-hover display" name="parameterTestcampaignsTable"></table>
                                <div class="mb-5"></div>
                            </div>
                        </div>

                        <!-- TAB: Execution Settings -->
                        <div x-show="campTab === 'settings'" id="tabsCreate-7">
                            <div id="exeParamList">
                                <div class="mb-3">
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="tagField">Tag</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="tags" id="tag"/>
                                </div>
                                <div class="grid grid-cols-3 gap-3 mb-3">
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="verboseField">Verbose</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="verbose" name="verbose"></select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="screenshotField">Screenshot</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="screenshot" name="screenshot"></select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="videoField">Video</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="video" name="video"></select>
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-3 mb-3">
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="pageSourceField">Page Source</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="pageSource" name="pageSource"></select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="robotLogField">Robot Log</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="robotLog" name="robotLog"></select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="consoleLogField">Console Log</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="consoleLog" name="consoleLog"></select>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-3 mb-3">
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="timeoutField">Timeout</label>
                                        <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="timeout" id="timeout"/>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="retriesField">Retries</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="retries" name="retries"></select>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-3 mb-3">
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="pritorityField">Priority</label>
                                        <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="priority" id="priority"/>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="manualExecutionField">Manual Execution</label>
                                        <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="manualExecution" name="manualExecution"></select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- TAB: Scheduler -->
                        <div x-show="campTab === 'scheduler'" id="tabsEdit-8">
                            <div class="mb-4 p-3 rounded-lg bg-slate-50 dark:bg-slate-800">
                                <p class="text-xs text-slate-500 dark:text-slate-400 mb-1" name="lbl_ex1">Example 1 : Every Week day at 12</p>
                                <input class="w-full h-9 border rounded-md px-3 py-1.5 text-xs bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 mb-2" id="ex1" readonly value="0 0 12 ? * MON-FRI *"/>
                                <p class="text-xs text-slate-500 dark:text-slate-400 mb-1" name="lbl_ex2">Example 2 : Every 10 minutes</p>
                                <input class="w-full h-9 border rounded-md px-3 py-1.5 text-xs bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 mb-2" id="ex2" readonly value="0 0/10 * 1/1 * ? *"/>
                                <p class="text-xs text-slate-500 dark:text-slate-400">Build your own syntax at <a target="_blank" href="http://www.cronmaker.com/" class="text-sky-500 hover:underline">cronmaker.com</a></p>
                            </div>
                            <div id="listPanelEditScheduler">
                                <table class="w-full text-sm" id="schedulerTable">
                                    <tbody id="schedulerTableBody">
                                    </tbody>
                                </table>
                                <button type="button" class="mt-3 px-3 py-1.5 rounded-md border border-dashed border-slate-300 dark:border-slate-600 text-sm text-slate-500 dark:text-slate-400 hover:border-sky-400 hover:text-sky-500 transition flex items-center gap-1.5" id="addScheduleEntry">
                                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Schedule Entry
                                </button>
                            </div>
                        </div>

                        <!-- TAB: Notifications -->
                        <div x-show="campTab === 'notifs'" id="tabsNotif">
                            <div id="listPanelEditExecutors">
                                <table class="w-full text-sm" id="eventHookTable">
                                    <tbody id="eventHookTableBody">
                                    </tbody>
                                </table>
                                <button type="button" class="mt-3 px-3 py-1.5 rounded-md border border-dashed border-slate-300 dark:border-slate-600 text-sm text-slate-500 dark:text-slate-400 hover:border-sky-400 hover:text-sky-500 transition flex items-center gap-1.5" id="addEventHook">
                                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Notification
                                </button>
                            </div>
                        </div>

                        <!-- TAB: Advanced -->
                        <div x-show="campTab === 'advanced'" id="tabs-9">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_gp1">Group 1</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="group1" name="group1" maxlength="100"/>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_gp2">Group 2</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="group2" name="group2" maxlength="100"/>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_gp3">Group 3</label>
                                <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" id="group3" name="group3" maxlength="100"/>
                            </div>
                        </div>

                        <!-- TAB: Traceability -->
                        <div x-show="campTab === 'trace'" id="tabsEdit-5">
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_created">Created</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="datecreated" name="datecreated" readonly/>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_creator">Creator</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="usrcreated" name="usrcreated" readonly/>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-3 mb-3">
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_lastModified">Last Modified</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="datemodif" name="datemodif" readonly/>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_lastModifier">Last Modifier</label>
                                    <input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="usrmodif" name="usrmodif" readonly/>
                                </div>
                            </div>
                        </div>

                    </form>
                </div>

            <!-- FOOTER -->
            <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
                <button type="button" @click="open = false" class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition" name="buttonClose">Close</button>
                <button type="button" id="editTestcampaignButton" class="px-4 py-2 rounded-md bg-blue-400 text-white text-sm hover:bg-blue-700 transition" name="buttonEdit">Save</button>
                <button type="button" id="addTestcampaignButton" class="px-4 py-2 rounded-md bg-blue-400 text-white text-sm hover:bg-blue-700 transition" name="buttonAdd">Create</button>
            </div>
        </div>

    </div>
</div>

<script>
    tinymce.init({
        selector: ".wysiwyg"
    });

    // ===== ALPINE COMPONENT =====
    function campaignModal() {
        return {
            open: false,
            isFullscreen: false,
            campTab: 'description',
            labelSubTab: 'labels',

            handleOpen: function(detail) {
                this.open = true;
                this.campTab = 'description';
                this.$nextTick(function() {
                    if (window.lucide) lucide.createIcons();
                    hideLegacyButtons();
                    setTimeout(hideLegacyButtons, 300);
                    setTimeout(hideLegacyButtons, 800);
                });
            },

            init: function() {
                this.$nextTick(function() {
                    if (window.lucide) lucide.createIcons();
                });
            }
        };
    }

    function hideLegacyButtons() {
        var m = document.getElementById('editTestcampaignModal');
        if (!m) return;
        ['resetFilterButton','restoreFilterButton','saveTableConfigurationButton','showHideColumnsButton'].forEach(function(id) {
            m.querySelectorAll('#' + id).forEach(function(el) { el.style.display = 'none'; });
        });
        m.querySelectorAll('.dt-buttons, .DTTT_container').forEach(function(el){ el.style.display='none'; });
    }

    // ===== MODAL LOGIC (merged from js/transversalobject/Campaign.js) =====

function renderOptionsForCampaign_Label(tableId) {
    var doc = new Doc();
    var data = getSelectInvariant("SYSTEM", false, false, "");
    $("#" + tableId + "_wrapper #addLabelTestcampaign").remove();
    var contentToAdd =
            "<div class='flex items-center gap-2 mb-3' id='addLabelTestcampaign'>" +
            "<div class='flex-1'>" +
            "<select id='labelSelect' class='w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300' style='width:100%;' onchange='updateSelectLabel(\"" + tableId + "\")'>";
    for (var i = 0; i < data.find("option").length; i++) {
        contentToAdd +=
                "<option value='" + data.find("option")[i].value + "'>" + data.find("option")[i].value + "</option>";
    }
    contentToAdd +=
            "</select>" +

function camp_getComboConfigLabel(labelType, system, tableId) {

    var config =
            {
                placeholder: {
                    id: '-1', // the value of the option
                    description: 'Select a Label',
                    label: 'Select a Label',
                    color: '#8b8b8c'
                },
                allowClear: true,
                ajax: {
                    url: "ReadLabel?bStrictSystemFilter=Y&iSortCol_0=0&sSortDir_0=desc&sColumns=type&iDisplayLength=30&sSearch_0=" + labelType + "&system=" + system,
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        params.page = params.page || 1;
                        return {
                            sSearch: params.term, // search term
                            iDisplayStart: (params.page * 30) - 30
                        };
                    },
                    processResults: function (data, params) {
                        params.page = params.page || 1;
                        return {
                            results: $.map(data.contentTable, function (obj) {
                                if (!(findValueTableDataByCol(tableId, 2, obj.id))) {
                                    return {
                                        id: obj.id,
                                        label: obj.label,
                                        color: obj.color,
                                        description: obj.description,
                                        system: obj.system,
                                        type: obj.type
                                    };
                                }
                            }),
                            pagination: {
                                more: (params.page * 30) < data.iTotalRecords
                            }
                        };
                    },
                    cache: true,
                    allowClear: true
                },
                width: "100%",
                escapeMarkup: function (markup) {
                    return markup;
                }, // let our custom formatter work
                minimumInputLength: 0,
                templateResult: camp_comboConfigLabel_format, // omitted for brevity, see the source of this page
                templateSelection: camp_comboConfigLabel_formatSelection // omitted for brevity, see the source of this page
            };

    return config;
}

function camp_comboConfigLabel_format(label) {
    var markup = "<div class='select2-result-tag clearfix'>" +
            "<div style='float:left;'><span class='label label-primary' style='background-color:"
            + label.color + "' data-toggle='tooltip' data-labelid='"
            + label.id + "' title='"
            + label.description + "'>"
            + label.label + "</span> ["

function camp_comboConfigLabel_formatSelection(label) {
    var result = label.id;

function reliability(tag) {
    if (tag.nbExe > 0) {
        var per = (tag.nbExeUsefull / tag.nbExe) * 100;
        var roundPercent = Math.round(per * 10) / 10;
        var satcolor = getGreenToRed(per);
        return "<div class=\"progress-bar\" role=\"progressbar\" style=\"width:" + per + "%; background-color: " + satcolor + "\">" + roundPercent + "%</div>";
    } else {
        return "";
    }
}

function getGreenToRed(percent) {
    r = percent < 50 ? 255 : Math.floor(255 - (percent * 2 - 100) * 255 / 100);
    g = percent > 50 ? 255 : Math.floor((percent * 2) * 255 / 100);
    return 'rgb(' + r + ',' + g + ',0)';
}

function result(tag) {
    var progress = "";
    if (tag.nbExeUsefull > 0) {
        progress += "<div class=\"progress-bar statusOK\" role=\"progressbar\" style=\"width:" + (tag.nbOK * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbOK * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusKO\" role=\"progressbar\" style=\"width:" + (tag.nbKO * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbKO * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusFA\" role=\"progressbar\" style=\"width:" + (tag.nbFA * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbFA * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusNA\" role=\"progressbar\" style=\"width:" + (tag.nbNA * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbNA * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusNE\" role=\"progressbar\" style=\"width:" + (tag.nbNE * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbNE * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusWE\" role=\"progressbar\" style=\"width:" + (tag.nbWE * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbWE * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusPE\" role=\"progressbar\" style=\"width:" + (tag.nbPE * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbPE * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusQU\" role=\"progressbar\" style=\"width:" + (tag.nbQU * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbQU * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusQE\" role=\"progressbar\" style=\"width:" + (tag.nbQE * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbQE * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
        progress += "<div class=\"progress-bar statusCA\" role=\"progressbar\" style=\"width:" + (tag.nbCA * 100 / tag.nbExeUsefull) + "%;\">" + Math.round((tag.nbCA * 100 / tag.nbExeUsefull) * 10) / 10 + "%</div>";
    }
    return progress;
}

function getDuration(tag) {
    let res = {};
    var startTime = new Date(tag.DateStartExe);
    var endTime = new Date(tag.DateEndQueue);
    var diff = (endTime - startTime) / 1000;
    res.disp = getHumanReadableDuration(diff);
    res.data = diff;
    return res;
}

    var cronInput = $("<input name=\"cronDefinition\" maxlength=\"200\">").addClass("form-control").val(scheduler.cronDefinition);
    loadCronList(cronInput);
    var descInput = $("<input name=\"cronDescription\" maxlength=\"200\">").addClass("form-control").val(scheduler.description);
    var activeInput = $("<input name=\"cronActive\" type='checkbox'>").addClass("form-control").prop("checked", activebool);
    var lastExecInput = $("<input name=\"cronLastExecInput\" readonly>").addClass("form-control input-sm").val(getDate(scheduler.lastExecution));
    var userCreateInput = $("<input name=\"cronUserCreateInput\" readonly>").addClass("form-control input-sm").val(scheduler.usrCreated);
    var userModifInput = $("<input name=\"cronUserModifInput\" readonly>").addClass("form-control input-sm").val(scheduler.usrModif);

    var cron = $("<div class='form-group col-sm-10'></div>").append("<label for='cronDefinition'>" + doc.getDocOnline("scheduleentry", "cronDefinition") + "</label>").append(cronInput);
    var active = $("<div class='form-group col-sm-2'></div>").append("<label for='cronActive'>" + doc.getDocOnline("scheduleentry", "active") + "</label>").append(activeInput);
    var lastExec = $("<div class='form-group col-sm-4'></div>").append("<label for='cronLastExecInput'>" + doc.getDocOnline("scheduleentry", "lastexecution") + "</label>").append(lastExecInput);
    var description = $("<div class='form-group col-sm-12'></div>").append("<label for='cronDescription'>" + doc.getDocOnline("scheduleentry", "description") + "</label>").append(descInput);
    var userCreate = $("<div class='form-group col-sm-4'></div>").append("<label for='cronUserCreateInput'>" + doc.getDocOnline("transversal", "UsrCreated") + "</label>").append(userCreateInput);
    var userModif = $("<div class='form-group col-sm-4'></div>").append("<label for='cronUserModifInput'>" + doc.getDocOnline("transversal", "UsrModif") + "</label>").append(userModifInput);


    var table = $('#schedulerTableBody');
    var row = $("<tr class='dataField'></tr>");

    var drow1 = $("<div class='row'></div>").append(cron).append(active).append(description).append(lastExec).append(userCreate).append(userModif);

    var td1 = $("<td class='row form-group'></td>").append(deleteBtn);
    var td2 = $("<td class='row form-group'></td>").append(drow1);

    deleteBtn.click(function () {
        scheduler.toDelete = (scheduler.toDelete) ? false : true;
        if (scheduler.toDelete) {
            row.addClass("danger");
        } else {
            row.removeClass("danger");
        }
    });

    cronInput.change(function () {
        scheduler.cronDefinition = $(this).val();
    });

    descInput.change(function () {
        scheduler.description = $(this).val();
    });

    activeInput.change(function () {
        if ($(this).prop("checked")) {
            scheduler.isActive = "Y";
        } else {
            scheduler.isActive = "N";
        }
    });

    row.append(td1);
    row.append(td2);
    row.data("scheduler", scheduler);
    table.append(row);

function appendEventHookRow(eventHook) {

    var doc = new Doc();

    var deleteBtn = $('<button type="button" class="inline-flex items-center justify-center h-8 w-8 rounded-md text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>');
    var eventRefInput = $("<select></select>").addClass("form-control");
    eventRefInput.append($("<option></option>").text("CAMPAIGN_START").val("CAMPAIGN_START"));
    eventRefInput.append($("<option></option>").text("CAMPAIGN_END").val("CAMPAIGN_END"));
    eventRefInput.append($("<option></option>").text("CAMPAIGN_END_CIKO").val("CAMPAIGN_END_CIKO"));
    eventRefInput.val(eventHook.eventReference);
    var activeInput = $("<input name=\"eventActive\" type='checkbox'>").addClass("form-control").prop("checked", eventHook.isActive);
    var descInput = $("<input name=\"eventDescription\" maxlength=\"200\">").addClass("form-control").val(eventHook.description);
    var hookConnectorInput = getSelectInvariant("EVENTCONNECTOR", false);
    hookConnectorInput.val(eventHook.hookConnector);
    var hookRecipientInput = $("<input name=\"hookRecipient\">").addClass("form-control").val(eventHook.hookRecipient);
    var hookChannelInput = $("<input name=\"hookChannel\">").addClass("form-control").val(eventHook.hookChannel);
    var userCreateInput = $("<input name=\"eventUserCreateInput\" readonly>").addClass("form-control input-sm").val(eventHook.usrCreated);
    var userModifInput = $("<input name=\"eventUserModifInput\" readonly>").addClass("form-control input-sm").val(eventHook.usrModif);

    var eventRef = $("<div class='form-group col-sm-4'></div>").append("<label for='eventReference'>" + doc.getDocOnline("eventhook", "EventReference") + "</label>").append(eventRefInput);
    var description = $("<div class='form-group col-sm-6'></div>").append("<label for='eventDescription'>" + doc.getDocOnline("eventhook", "Description") + "</label>").append(descInput);
    var active = $("<div class='form-group col-sm-2'></div>").append("<label for='eventActive'>" + doc.getDocOnline("eventhook", "IsActive") + "</label>").append(activeInput);
    var hookConnector = $("<div class='form-group col-sm-3'></div>").append("<label for='hookConnector'>" + doc.getDocOnline("eventhook", "HookConnector") + "</label>").append(hookConnectorInput);
    var hookRecipient = $("<div class='form-group col-sm-5'></div>").append("<label for='hookRecipient'>" + doc.getDocOnline("eventhook", "HookRecipient") + "</label>").append(hookRecipientInput);
    var hookChannel = $("<div class='form-group col-sm-4'></div>").append("<label for='hookChannel'>" + doc.getDocOnline("eventhook", "HookChannel") + "</label>").append(hookChannelInput);
    var userCreate = $("<div class='form-group col-sm-4'></div>").append("<label for='cronUserCreateInput'>" + doc.getDocOnline("eventhook", "UsrCreated") + "</label>").append(userCreateInput);
    var userModif = $("<div class='form-group col-sm-4'></div>").append("<label for='cronUserModifInput'>" + doc.getDocOnline("eventhook", "UsrModif") + "</label>").append(userModifInput);
    var logo = $("<span class='fa fa-fw col-sm-12' style='font-size:50px;'></span>");
    logo.addClass(getClass(eventHook.hookConnector));

    if (eventHook.hookConnector === "SLACK") {
        hookChannel.show();
        hookRecipient.removeClass("col-sm-5 col-sm-9");
        hookRecipient.addClass("col-sm-5");
    } else {
        hookChannel.hide();
        hookRecipient.removeClass("col-sm-5 col-sm-9");
        hookRecipient.addClass("col-sm-9");
    }

//
    var table = $('#eventHookTableBody');
    var row = $("<tr></tr>");

    var drow01 = $("<div class='row'></div>").append(deleteBtn);
    var drow02 = $("<div class='row'></div>").append(logo);

    var drow1 = $("<div class='row'></div>").append(eventRef).append(description).append(active);
    var drow2 = $("<div class='row'></div>").append(hookConnector).append(hookRecipient).append(hookChannel);

    var td1 = $("<td></td>").append(drow01).append(drow02);
    var td2 = $("<td></td>").append(drow1).append(drow2);

    deleteBtn.click(function () {
        eventHook.toDelete = (eventHook.toDelete) ? false : true;
        if (eventHook.toDelete) {
            row.addClass("danger");
        } else {
            row.removeClass("danger");
        }
    });

    hookConnectorInput.change(function () {
        eventHook.hookConnector = $(this).val();

        logo.removeClass("fa-slack fa-windows fa-at fa-external-link fa-google");
        logo.addClass(getClass($(this).val()));
        if ($(this).val() === "SLACK") {
            hookChannel.show();
            hookRecipient.removeClass("col-sm-5 col-sm-9");
            hookRecipient.addClass("col-sm-5");
        } else {
            hookChannel.hide();
            hookRecipient.removeClass("col-sm-5 col-sm-9");
            hookRecipient.addClass("col-sm-9");
        }

    });

    eventRefInput.change(function () {
        eventHook.eventReference = $(this).val();
    });

    descInput.change(function () {
        eventHook.description = $(this).val();
    });

    hookRecipientInput.change(function () {
        eventHook.hookRecipient = $(this).val();
    });

    hookChannelInput.change(function () {
        eventHook.hookChannel = $(this).val();
    });

    activeInput.change(function () {
        console.info($(this).prop("checked"));
        console.info($(this).val());
        eventHook.isActive = $(this).prop("checked");
    });

    row.append(td1);
    row.append(td2);
    row.data("eventHook", eventHook);
    table.append(row);
}

function getClass(connector) {
    if (connector === "TEAMS") {
        return "fa-windows";
    } else if (connector === "SLACK") {
        return "fa-slack";
    } else if (connector === "EMAIL") {
        return "fa-at";
    } else if (connector === "GOOGLE-CHAT") {
        return "fa-google";
    } else if (connector === "GENERIC") {
        return "fa-external-link";
    }
    return "fa-external-link";
}

function addNewSchedulerRow() {
    var newScheduler = {
        cronDefinition: "",
        isActive: "Y",
        lastExecution: "",
        description: "",
        id: "0",
        toDelete: false
    };
    appendSchedulerRow(newScheduler);
    refreshPopoverDocumentation("schedulerTable");

}

function addNewEventHookRow() {
    var newEventHook = {
        eventReference: "CAMPAIGN_START",
        isActive: true,
        hookConnector: "EMAIL",
        hookRecipient: "",
        hookChannel: "",
        objectKey1: "",
        objectKey2: "",
        description: "",
        id: 0,
        toDelete: false
    };
    appendEventHookRow(newEventHook);
    refreshPopoverDocumentation("eventHookTable");

}

</script>
