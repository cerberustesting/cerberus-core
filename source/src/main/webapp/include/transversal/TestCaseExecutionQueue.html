<!--Edit ExecutionQueue page - Alpine/Tailwind refactored -->
<div x-data="executionQueueModal()"
     x-show="open"
     x-cloak
     @exequeue-modal-open.window="handleOpen($event.detail)"
     @exequeue-modal-close.window="open = false"
     class="crb_modal"
     id="editExecutionQueueModal">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <!-- Modal Card -->
    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[1050px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-amber-600/10 flex items-center justify-center">
                    <i data-lucide="list-ordered" class="w-5 h-5 text-amber-600"></i>
                </div>
                <div>
                    <h4 class="!text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100" id="editExecutionQueueModalLabel" name="editExecutionQueueField">Execution Queue</h4>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0">View and manage queued test case executions</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-amber-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="open = false"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- Top fields -->
        <form id="editExecutionQueueModalForm" name="editExecutionQueueModalForm" role="form" style="display:contents;">
            <div class="px-6 pt-2 pb-2 shrink-0">
                <div class="flex gap-3">
                    <div class="w-1/4">
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="id" name="idField">ID</label>
                        <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="id" id="id" readonly="readonly" />
                        <input type="hidden" name="originalId" id="originalId" />
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="tag" name="tagField">Tag</label>
                        <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="tag" id="tag" readonly="readonly" maxlength="255"/>
                    </div>
                    <div class="w-1/6">
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" for="priority" name="priorityField">Priority</label>
                        <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all" name="priority" id="priority" readonly="readonly" />
                    </div>
                </div>
            </div>

            <div id="messageArea2" class="px-6"></div>

            <!-- TABS -->
            <div class="flex flex-col flex-1 min-h-0">
                <div class="w-full flex bg-slate-200 dark:bg-slate-700 p-1 mx-6 mb-2 rounded-lg shadow-sm h-10" style="width: calc(100% - 3rem);">
                    <template x-for="t in [
                        {id:'definition', label:'Definition', name:'tabsEditQ1'},
                        {id:'robot', label:'Robot Settings', name:'tabsEditQ2'},
                        {id:'execsettings', label:'Exec Settings', name:'tabsEditQ3'},
                        {id:'dependencies', label:'Dependencies', name:'tabsEditQ4'},
                        {id:'trace', label:'Traceability', name:'tabsEditQ5'}
                    ]" :key="t.id">
                        <button type="button" @click="qTab = t.id"
                                :class="qTab === t.id
                                    ? 'bg-slate-50 font-semibold dark:bg-slate-900'
                                    : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                                class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap"
                                :id="'tab' + t.name + 'Text'" :name="t.name"
                                x-text="t.label">
                        </button>
                    </template>
                </div>

                <!-- BODY -->
                <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">

                    <!-- Messages area -->
                    <div id="DialogMessagesArea" class="mb-3">
                        <div class="alert" id="DialogMessagesAlert" style="display:none;">
                            <strong><span class="alert-description" id="DialogAlertDescription"></span></strong>
                            <button type="button" class="close" data-hide="alert" aria-hidden="true">
                                <span class="glyphicon glyphicon-trash alert-right alert-close pull-right"></span>
                            </button>
                        </div>
                    </div>

                    <!-- TAB: Definition -->
                    <div x-show="qTab === 'definition'" id="tabsEditQ-1">
                        <div class="grid grid-cols-4 gap-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="requestDateField">Last State Date</label>
                                <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="requestDate" id="requestDate" readonly="readonly" />
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="stateField">State</label>
                                <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="state" id="state" readonly="readonly" />
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="exeIdField">Execution ID</label>
                                <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" name="exeId" id="exeId" readonly="readonly" />
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="debugFlagField">Debug Flag</label>
                                <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="debugFlag" name="debugFlag" disabled></select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="commentField">Comment</label>
                            <textarea id="comment" name="comment" class="w-full border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" maxlength="3000" readonly="readonly"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="testField">Test</label>
                                <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="test" name="test" disabled></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="testCaseField">TestCase</label>
                                <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="testCase" name="testCase" disabled></select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="typeField">Environment</label>
                                <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="environment" name="environment" disabled></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="typeField">Country</label>
                                <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="country" name="country" disabled></select>
                            </div>
                        </div>
                        <div class="grid grid-cols-4 gap-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="manualURLField">Manual URL</label>
                                <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="manualURL" name="manualURL" disabled></select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="manualHostField">Host</label>
                                <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" name="manualHost" id="manualHost" readonly="readonly" />
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="manualContextRootField">Context Root</label>
                                <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" name="manualContextRoot" id="manualContextRoot" readonly="readonly" />
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="manualLoginRelativeURLField">Login URL</label>
                                <input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" name="manualLoginRelativeURL" id="manualLoginRelativeURL" readonly="readonly" />
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="ManualEnvDataField">Environment Data</label>
                                <select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="manualEnvData" name="manualEnvData" disabled></select>
                            </div>
                        </div>
                    </div>

                    <!-- TAB: Robot Settings -->
                    <div x-show="qTab === 'robot'" id="tabsEditQ-2">
                        <div class="space-y-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Robot Config</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="robot" name="robot" disabled></select></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Robot Server IP</label><input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="robotIP" name="robotIP" readonly="readonly" /></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Robot Server Port</label><input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="robotPort" name="robotPort" readonly="readonly" /></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Platform</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="platform" name="platform" disabled></select></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Browser</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="browser" name="browser" disabled></select></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Version</label><input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="browserVersion" name="browserVersion" readonly="readonly" /></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Screen Size</label><input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" name="screenSize" id="screenSize" maxlength="250" readonly="readonly" /></div>
                        </div>
                    </div>

                    <!-- TAB: Execution Settings -->
                    <div x-show="qTab === 'execsettings'" id="tabsEditQ-3">
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Verbose</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="verbose" name="verbose" disabled></select></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Screenshot</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="screenshot" name="screenshot" disabled></select></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Video</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="video" name="video" disabled></select></div>
                        </div>
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Page Source</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="pageSource" name="pageSource" disabled></select></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Robot Log</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="robotLog" name="robotLog" disabled></select></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Console Log</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="consoleLog" name="consoleLog" disabled></select></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Timeout</label><input type="text" class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="timeout" name="timeout" readonly="readonly"/></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Retries</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="retries" name="retries" disabled></select></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Manual Execution</label><select class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300" id="manualExecution" name="manualExecution" disabled></select></div>
                        </div>
                    </div>

                    <!-- TAB: Dependencies -->
                    <div x-show="qTab === 'dependencies'" id="tabsEditQ-4">
                        <div id="listPanelDep">
                            <table class="w-full text-sm" id="depTable">
                                <tbody id="depQueueTableBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- TAB: Traceability -->
                    <div x-show="qTab === 'trace'" id="tabsEditQ-5">
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_created">Created</label><input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="datecreated" name="datecreated" readonly/></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_creator">Creator</label><input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="usrcreated" name="usrcreated" readonly/></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_lastModified">Last Modified</label><input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="datemodif" name="datemodif" readonly/></div>
                            <div><label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="lbl_lastModifier">Last Modifier</label><input class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-500 dark:text-slate-400" id="usrmodif" name="usrmodif" readonly/></div>
                        </div>
                    </div>

                </div>
            </div>
        </form>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
            <button type="button" @click="open = false" class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition" name="buttonClose">Close</button>
            <button type="button" id="saveExecutionQueueButton" class="px-4 py-2 rounded-md bg-blue-400 text-white text-sm hover:bg-blue-700 transition" name="buttonSave">Save</button>
            <button type="button" id="submitExecutionQueueButton" class="px-4 py-2 rounded-md bg-blue-400 text-white text-sm hover:bg-blue-700 transition" name="buttonSubmit">Save and submit again</button>
            <button type="button" id="duplicateExecutionQueueButton" class="px-4 py-2 rounded-md bg-blue-400 text-white text-sm hover:bg-blue-700 transition" name="buttonDuplicate">Copy and Submit</button>
            <button type="button" id="cancelExecutionQueueButton" class="px-4 py-2 rounded-md bg-red-400 text-white text-sm hover:bg-red-700 transition" name="buttonCancel">Cancel execution</button>
        </div>
    </div>
</div>

<script>
    function executionQueueModal() {
        return {
            open: false,
            isFullscreen: false,
            qTab: 'definition',
            handleOpen: function(detail) {
                this.open = true;
                this.qTab = 'definition';
                this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
            },
            init: function() {
                this.$nextTick(function() { if (window.lucide) lucide.createIcons(); });
            }
        };
    }

    // ===== MODAL LOGIC (merged from js/transversalobject/TestCaseExecutionQueue.js) =====

    function openModalTestCaseExecutionQueue(queueID, mode) {
        if ($('#editExecutionQueueModal').data("initLabel") === undefined) {
            initModalTestcaseExecutionQueue();
            $('#editExecutionQueueModal').data("initLabel", true);
        }
        if (mode === "EDIT") {
            exeQueue_editClick(queueID);
        } else {
            exeQueue_duplicateClick(queueID);
        }
    }

    function initModalTestcaseExecutionQueue() {
        var doc = new Doc();
        $("[name='buttonClose']").html(doc.getDocLabel("page_global", "buttonClose"));
        $("[name='buttonAdd']").html(doc.getDocLabel("page_global", "btn_add"));
        $("[name='lbl_created']").html(doc.getDocOnline("transversal", "DateCreated"));
        $("[name='lbl_creator']").html(doc.getDocOnline("transversal", "UsrCreated"));
        $("[name='lbl_lastModified']").html(doc.getDocOnline("transversal", "DateModif"));
        $("[name='lbl_lastModifier']").html(doc.getDocOnline("transversal", "UsrModif"));

        $("#submitExecutionQueueButton").off("click");
        $("#submitExecutionQueueButton").click(function () {
            exeQueue_confirmHandler("EDIT", "toQUEUED", "save");
        });
        $("#saveExecutionQueueButton").off("click");
        $("#saveExecutionQueueButton").click(function () {
            exeQueue_confirmHandler("EDIT", "", "save");
        });
        $("#cancelExecutionQueueButton").off("click");
        $("#cancelExecutionQueueButton").click(function () {
            exeQueue_confirmHandler("EDIT", "toCANCELLED", "");
        });
        $("#duplicateExecutionQueueButton").off("click");
        $("#duplicateExecutionQueueButton").click(function () {
            exeQueue_confirmHandler("DUPLICATE", "toQUEUED", "save");
        });

    function exeQueue_confirmHandler(mode, queueAction, saveAction) {
        clearResponseMessage($('#editExecutionQueueModal'));
        var formEdit = $('#editExecutionQueueModal #editExecutionQueueModalForm');
        if (mode === 'EDIT') { formEdit.find("#id").removeAttr("disabled"); }
        var myServlet = "UpdateTestCaseExecutionQueue";
        if ((mode === "ADD") || (mode === "DUPLICATE")) { myServlet = "CreateTestCaseExecutionQueue"; }
        var data = convertSerialToJSONObject(formEdit.serialize());
        var tcElement = formEdit.find("#testCase");
        if (isEmpty(data.testCase)) {
            tcElement.parents("div.form-group").addClass("has-error");
            var localMessage = new Message("danger", "Please specify a Test Case value !");
            showMessage(localMessage, $('#editExecutionQueueModal'));
            return;
        } else {
            tcElement.parents("div.form-group").removeClass("has-error");
        }
        showLoaderInModal('#editExecutionQueueModal');
        $.ajax({
            url: myServlet, async: true, method: "POST",
            data: {
                id: data.id, tag: data.tag, test: data.test, testCase: data.testCase,
                environment: data.environment, country: data.country, manualURL: data.manualURL,
                manualHost: data.manualHost, manualContextRoot: data.manualContextRoot,
                manualLoginRelativeURL: data.manualLoginRelativeURL, manualEnvData: data.manualEnvData,
                robot: data.robot, robotIP: data.robotIP, robotPort: data.robotPort,
                browser: data.browser, browserVersion: data.browserVersion, platform: data.platform,
                screenSize: data.screenSize, verbose: data.verbose, screenshot: data.screenshot,
                video: data.video, pageSource: data.pageSource, robotLog: data.robotLog,
                consoleLog: data.consoleLog, timeout: data.timeout, retries: data.retries,
                priority: data.priority, debugFlag: data.debugFlag, manualExecution: data.manualExecution,
                actionState: queueAction, actionSave: saveAction
            },
            success: function (data) {
                hideLoaderInModal('#editExecutionQueueModal');
                if (getAlertType(data.messageType) === "success") {
                    var oTable = $("#executionsTable").dataTable();
                    oTable.fnDraw(false);
                    $('#editExecutionQueueModal').data("Saved", true);
                    window.dispatchEvent(new CustomEvent('exequeue-modal-close'));
                    if (data.addedEntries === 1) {
                        data.message = data.message + "<a href='TestCaseExecution.jsp?executionQueueId=" + data.testCaseExecutionQueueList[0].id + "'><button class='btn btn-primary' id='goToExecution'>Open Execution</button></a>";
                    }
                    showMessageMainPage(getAlertType(data.messageType), data.message, false, 60000);
                } else {
                    showMessage(data, $('#editExecutionQueueModal'));
                }
            },
            error: showUnexpectedError
        });
        if (mode === 'EDIT') { formEdit.find("#id").prop("disabled", "disabled"); }
    }

    function exeQueue_feedTestCase(test, selectElement, defaultTestCase) {
        var testCList = $(selectElement);
        testCList.empty();
        var jqxhr = $.getJSON("ReadTestCase", "test=" + test);
        $.when(jqxhr).then(function (data) {
            for (var index = 0; index < data.contentTable.length; index++) {
                testCList.append($('<option></option>').text(data.contentTable[index].testcase + " - " + data.contentTable[index].description).val(data.contentTable[index].testcase));
            }
            if (!isEmpty(defaultTestCase)) { testCList.prop("value", defaultTestCase); }
        });
    }

    function exeQueue_feedModal(queueid, modalId, mode) {
        clearResponseMessageMainPage();
        var formEdit = $('#' + modalId);
        $.ajax({
            url: "ReadTestCaseExecutionQueue?queueid=" + queueid, async: true, method: "GET",
            success: function (data) {
                if (data.messageType === "OK") {
                    var exeQ = data.contentTable;
                    var hasPermissions = data.hasPermissions;
                    if (mode === "EDIT") {
                        if (exeQ.state === "CANCELLED") { $('#cancelExecutionQueueButton').attr('class', 'hidden').prop('hidden', 'hidden'); }
                        if ((exeQ.state === "STARTING") || (exeQ.state === "EXECUTING") || (exeQ.state === "DONE")) {
                            $('#cancelExecutionQueueButton').attr('class', 'hidden').prop('hidden', 'hidden');
                            $('#saveExecutionQueueButton').attr('class', 'hidden').prop('hidden', 'hidden');
                            $('#submitExecutionQueueButton').attr('class', 'hidden').prop('hidden', 'hidden');
                            hasPermissions = false;
                        }
                        if ((exeQ.state === "QUEUED") || (exeQ.state === "QUWITHDEP") || (exeQ.state === "QUEUED_PAUSED") || (exeQ.state === "QUWITHDEP_PAUSED")) {
                            $('#submitExecutionQueueButton').attr('class', 'hidden').prop('hidden', 'hidden');
                        }
                    }
                    exeQueue_feedModalData(exeQ, modalId, mode, hasPermissions);
                    window.dispatchEvent(new CustomEvent('exequeue-modal-open'));
                } else {
                    showUnexpectedError(null, "ERROR", data.message);
                }
            },
            error: showUnexpectedError
        });
    }

    function enableDisableJob() {
        var newValue = "N";

        if (curValue === "true") { newValue = "N"; } else { newValue = "Y"; }
        var jqxhr = $.getJSON("UpdateParameter", "id=cerberus_queueexecution_enable&value=" + newValue + "&system1=" + getUser().defaultSystem);
        $.when(jqxhr).then(function () { displayAndRefresh_jobStatus(); });
    }

    function drawDependencies(depList, targetTableBody, targetTab) {
        $("#" + targetTableBody).empty();
        if (depList.length <= 0) { $("#" + targetTab).hide(); } else {
            $("#" + targetTab).show();
            for (var i = 0; i < depList.length; i++) { appendDepRow(depList[i], targetTableBody); }
        }
    }

    function appendDepRow(dep, targetTableBody) {
        var doc = new Doc();
        var typeInput = $("<input readonly>").addClass("form-control input-sm").val(dep.type);
        var depTestInput = $("<input readonly>").addClass("form-control input-sm").val(dep.depTest);
        var depTestcaseInput = $("<input readonly>").addClass("form-control input-sm").val(dep.depTestCase);
        var depTCDelayInput = $("<input readonly>").addClass("form-control input-sm").val(dep.depTCDelay);
        var depEventInput = $("<input readonly>").addClass("form-control input-sm").val(dep.depEvent);
        var depDateInput = $("<input readonly>").addClass("form-control input-sm").val(getDate(dep.depDate));
        var statusInput = $("<input readonly>").addClass("form-control input-sm").val(dep.status);
        var releaseDateInput = $("<input readonly>").addClass("form-control input-sm").val(getDate(dep.releaseDate));
        var commentInput = $("<input readonly>").addClass("form-control input-sm").val(dep.comment);
        var exeButton = $("<button>").attr("type", "button").addClass("btn btn-sm btn-default").append($("<span>").addClass("glyphicon glyphicon-new-window"));
        var exeButtonA = $("<a>");
        if (dep.exeId > 0) { exeButtonA.attr("href", "./TestCaseExecution.jsp?executionId=" + dep.exeId); } else { exeButton.attr("disabled", true); }
        exeButtonA.append(exeButton);
        var queButton = $("<button>").attr("type", "button").addClass("btn btn-sm btn-default").append($("<span>").addClass("glyphicon glyphicon-new-window"));
        var queButtonA = $("<a>");
        if (dep.exeId > 0) { queButtonA.attr("href", "./TestCaseExecution.jsp?executionQueueId=" + dep.queueId); } else { queButton.attr("disabled", true); }
        queButtonA.append(queButton);
        var exeIdInput = $("<div>").addClass("input-group").append($("<input readonly>").addClass("form-control input-sm").val(dep.exeId)).append($("<span>").addClass("input-group-btn").append(exeButtonA));
        var queueIdInput = $("<div>").addClass("input-group").append($("<input readonly>").addClass("form-control input-sm").val(dep.queueId)).append($("<span>").addClass("input-group-btn").append(queButtonA));
        var table = $("#" + targetTableBody);
        var row = $("<tr></tr>");
        if (dep.status === "RELEASED") row.addClass("dep-success");
        if (dep.status === "IGNORED") row.addClass("dep-info");
        var type = $("<div class='form-group col-lg-3 col-sm-12'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "type") + "</label>").append(typeInput);
        var drow01 = $("<div class='row'></div>").append(type);
        if ((dep.type === "TCEXEENDOK") || (dep.type === "TCEXEEND")) {
            drow01.append($("<div class='form-group col-lg-5 col-sm-7'></div>").append("<label>" + doc.getDocOnline("test", "Test") + "</label>").append(depTestInput));
            drow01.append($("<div class='form-group col-lg-4 col-sm-5'></div>").append("<label>" + doc.getDocOnline("testcase", "TestCase") + "</label>").append(depTestcaseInput));
            drow01.append($("<div class='form-group col-lg-2 col-sm-4'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "DepTCDelay") + "</label>").append(depTCDelayInput));
        } else if (dep.type === "TIMING") {
            drow01.append($("<div class='form-group col-lg-6'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "DepDate") + "</label>").append(depDateInput));
        } else if (dep.type === "EVENT") {
            drow01.append($("<div class='form-group col-lg-9'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "executor") + "</label>").append(depEventInput));
        }
        var td1 = $("<td></td>").append(drow01);
        var status = $("<div class='form-group col-lg-3 col-md-6 col-sm-6'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "status") + "</label>").append(statusInput);
        var relDate = $("<div class='form-group col-lg-3 col-md-6 col-sm-6'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "releaseDate") + "</label>").append(releaseDateInput);
        var comDate = $("<div class='form-group col-lg-6 col-md-12 col-sm-12'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "comment") + "</label>").append(commentInput);
        var drow02 = $("<div class='row'></div>").append(status).append(relDate).append(comDate);
        if ((dep.type === "TCEXEENDOK") || (dep.type === "TCEXEEND")) {
            drow02.append($("<div class='form-group col-lg-4 col-md-4 col-sm-6'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "exeId") + "</label>").append(exeIdInput));
            drow02.append($("<div class='form-group col-lg-4 col-md-4 col-sm-6'></div>").append("<label>" + doc.getDocOnline("testcaseexecutionqueuedep", "exeQueueId") + "</label>").append(queueIdInput));
        }
        var td2 = $("<td></td>").append(drow02);
        row.append(td1).append(td2);
        table.append(row);
    }
