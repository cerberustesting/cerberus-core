<!--Edit Invariant - Alpine.js/Tailwind refactored -->
<div id="editInvariantModal" x-data="invariantModal()" x-cloak x-show="open" class="crb_modal">

    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-[750px] rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-blue-600/10 flex items-center justify-center">
                    <i data-lucide="list" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div>
                    <h4 class="!text-lg !font-semibold !mb-0 !mt-0 text-slate-900 dark:text-slate-100"
                        x-text="$store.labels.getLabel('pageInvariant','editinvarianttitle') || 'Edit Invariant'"></h4>
                    <p class="text-xs text-slate-500 dark:text-slate-400 !mb-0"
                       x-text="$store.labels.getLabel('pageInvariant','editinvariantsubtitle') || 'Manage invariant values'"></p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen" class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-amber-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="open = false" class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- TABS + BODY -->
        <div class="flex flex-col flex-1 min-h-0">
            <div class="w-full flex bg-slate-200 dark:bg-slate-700 p-1 mx-6 mb-2 rounded-lg shadow-sm h-10" style="width: calc(100% - 3rem);">
                <button type="button" @click.stop="tab = 'definition'" id="InvDefinition"
                        :class="tab === 'definition' ? 'bg-slate-50 font-semibold dark:bg-slate-900' : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap">Definition</button>
                <button type="button" @click.stop="tab = 'advanced'" id="InvAdvanced"
                        :class="tab === 'advanced' ? 'bg-slate-50 font-semibold dark:bg-slate-900' : 'bg-slate-200 dark:bg-slate-700 text-slate-700 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'"
                        class="flex-1 flex items-center justify-center px-3 py-1.5 rounded-md transition-colors duration-200 text-xs whitespace-nowrap">Advanced</button>
            </div>

            <!-- FIXED TOP: idName + value (outside scroll so dropdown is not clipped) -->
            <div class="px-6 pb-2">
                <div id="DialogMessagesArea" class="mb-3"></div>
                <form id="editInvariantModalFormTop" class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1"
                               x-text="$store.labels.getLabel('pageInvariant','idnamefield') || 'Invariant Type'"></label>
                        <div x-data="singleSelectDropdown({
                                 id: 'invariantSelect',
                                 loader: async () => {
                                     try {
                                         const r = await $.ajax({url: 'FindInvariantByID', data: { idName: 'INVARIANTPUBLIC' }, async: true});
                                         return r.map(i => i.value);
                                     } catch (e) { console.error('Failed to load invariants', e); return []; }
                                 },
                                 preselected: form.idName
                             })"
                             x-modelable="selectedValue"
                             x-model="form.idName"
                             @change="if (mode === 'EDIT') displayWarningOnChangeInvariantKey()">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="ValueField">Value</label>
                        <input type="text" x-model="form.value"
                               class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all"
                               name="value" id="value"
                               @keydown="validateKey($event)"
                               @change="if (mode === 'EDIT') displayWarningOnChangeInvariantKey()">
                    </div>
                </form>
            </div>

            <!-- BODY (scrollable) -->
            <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">
                <form id="editInvariantModalForm" name="editInvariantModalForm" role="form">

                    <!-- TAB: Definition -->
                    <div x-show="tab === 'definition'" id="tabInvDefinition">
                        <div class="space-y-3">
                            <div>
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="descriptionField">Description</label>
                                <textarea class="w-full border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all"
                                          name="description" id="description" rows="3" x-model="form.description"></textarea>
                            </div>
                            <div class="grid grid-cols-4 gap-3">
                                <div class="col-span-3">
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="veryShortDescField">Short Description</label>
                                    <textarea class="w-full border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all"
                                              name="veryShortDesc" id="veryShortDesc" rows="2" x-model="form.veryShortDesc"></textarea>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" name="sortField">Sort</label>
                                    <input type="number" x-model="form.sort"
                                           class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all"
                                           name="sort" id="sort">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- TAB: Advanced -->
                    <div x-show="tab === 'advanced'" id="tabInvAdvanced">
                        <div class="space-y-3">
                            <template x-for="(attr, index) in form.attributes" :key="index">
                                <div>
                                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1" :for="'gp'+(index+1)" x-text="'Attribute ' + (index+1)"></label>
                                    <input type="text"
                                           class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all"
                                           :id="'gp'+(index+1)"
                                           :name="'gp'+(index+1)"
                                           x-model="form.attributes[index]"
                                           @input="_allAttributes[index] = form.attributes[index];
                                                   if(index === form.attributes.length-1 && form.attributes[index] !== '' && form.attributes.length < 9) {
                                                       form.attributes.push('');
                                                   }">
                                </div>
                            </template>
                        </div>
                    </div>
                </form>
            </div>

            <!-- FOOTER -->
            <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
                <button type="button" @click="open = false" name="buttonClose"
                        class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition"
                        x-text="$store.labels.getLabel('common','buttonclose') || 'Close'"></button>
                <button id="editInvariantButton" name="buttonEdit"
                        class="px-4 py-2 rounded-md bg-sky-400 text-white text-sm hover:bg-sky-500 transition"
                        @click="confirmInvariantModalHandler()"
                        x-text="buttonLabel"></button>
            </div>
        </div>
    </div>
</div>
<script>
    function invariantModal() {
        return {
            open: false,
            isFullscreen: false,
            tab: 'definition',
            mode: 'EDIT',
            buttonLabel: 'Save',
            loading: false,
            form: {
                idName: '',
                value: '',
                description: '',
                veryShortDesc: '',
                sort: '',
                attributes: ['']
            },
            _allAttributes: ['', '', '', '', '', '', '', '', ''],
            original: {
                idName: '',
                value: ''
            },

            init() {
                this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
            },

            getButtonLabel() {
                if (this.mode === 'ADD')
                    return Alpine.store('labels').getLabel('common', 'buttonadd');
                if (this.mode === 'DUPLICATE')
                    return Alpine.store('labels').getLabel('common', 'buttonduplicate');
                return Alpine.store('labels').getLabel('common', 'buttonsave');
            },

            async openModalInvariant(invariant = '', value = '', mode = 'EDIT', tab = 'definition') {
                console.log("opened in mode : ", mode);
                this.tab = tab || 'definition';
                this.mode = mode;
                this.loading = true;
                this.buttonLabel = this.getButtonLabel();

                this.form.attributes = [''];

                if (mode === 'EDIT' || mode === 'DUPLICATE') {
                    const formData = new URLSearchParams();
                    formData.append('idName', invariant);
                    formData.append('value', value);

                    try {
                        const response = await fetch('ReadInvariant', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                            body: formData.toString()
                        });
                        const data = await response.json();
                        if (data.messageType === 'OK') {
                            this.feedInvariantModalData(data.contentTable, mode, data.contentTable.hasPermissionsUpdate);
                        } else {
                            alert("Unexpected error loading invariant");
                        }
                    } catch (e) {
                        console.error(e);
                        alert("Unexpected error loading invariant");
                    }
                } else {
                    const inv = {
                        idName: invariant, value: '', description: '', veryShortDesc: '', sort: '',
                        gp1: invariant === 'ROBOTHOST' ? '10' : '',
                        gp2: '', gp3: '', gp4: '', gp5: '', gp6: '', gp7: '', gp8: '', gp9: ''
                    };
                    this.feedInvariantModalData(inv, mode, true);
                }

                this.open = true;
                this.loading = false;
                this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
            },

            feedInvariantModalData(inv, mode, hasPermissionsUpdate) {
                const isEditable = ((hasPermissionsUpdate && mode === 'EDIT') || mode === 'DUPLICATE' || mode === 'ADD');

                this.form.idName = inv.idName;
                this.form.value = inv.value;
                this.form.description = inv.description || '';
                this.form.veryShortDesc = inv.veryShortDesc || '';
                this.form.sort = inv.sort || '';
                this.original.idName = inv.idName;
                this.original.value = inv.value;

                this._allAttributes = [
                    inv.gp1 || '', inv.gp2 || '', inv.gp3 || '', inv.gp4 || '', inv.gp5 || '',
                    inv.gp6 || '', inv.gp7 || '', inv.gp8 || '', inv.gp9 || ''
                ];

                const filledAttrs = this._allAttributes.filter(a => a && a.trim() !== '');
                filledAttrs.push('');
                this.form.attributes = filledAttrs;

                this.isEditable = isEditable;
            },

            displayWarningOnChangeInvariantKey() {
                if (this.form.idName !== this.original.idName || this.form.value !== this.original.value) {
                    notifyInline("WARNING: You are about to rename that invariant. For some invariant, it may have unexpected result. Do it with care.", 'info', "#DialogMessagesArea", true);
                }
            },

            validateKey(e) {
                if (['COUNTRY', 'ENVIRONMENT', 'SYSTEM'].includes(this.form.idName)) {
                    const forbidden = /[^a-zA-Z0-9_-]/;
                    if (forbidden.test(e.key)) {
                        notifyInline("WARNING: Character '" + e.key + "' is not allowed for " + this.form.idName + ". Use only letters, numbers , '-' and '_'.", 'warning', "#DialogMessagesArea", true);
                        e.preventDefault();
                    }
                }
            },

            async confirmInvariantModalHandler() {
                if (!this.form.value.trim()) {
                    alert("Please specify an invariant value!");
                    return;
                }

                const myServlet = (this.mode === 'EDIT') ? 'UpdateInvariant' : 'CreateInvariant';
                this.loading = true;

                const payload = new URLSearchParams();
                payload.append("originalIdName", this.original.idName);
                payload.append("originalValue", this.original.value);
                payload.append("idName", this.form.idName);
                payload.append("value", this.form.value);
                payload.append("sort", this.form.sort);
                payload.append("description", this.form.description);
                payload.append("veryShortDesc", this.form.veryShortDesc);

                for (let i = 0; i < 9; i++) {
                    payload.append('gp' + (i + 1), this._allAttributes[i] || '');
                }

                try {
                    const response = await fetch(myServlet, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: payload.toString()
                    });

                    const data = await response.json();
                    this.loading = false;

                    if (data.messageType === 'OK') {
                        let notificationMessage = Alpine.store('labels').getLabel('pageInvariant', 'notifsuccessmodification') || 'Success!';

                        switch (this.mode) {
                            case 'EDIT':
                                notificationMessage = Alpine.store('labels').getLabel('pageInvariant', 'notifsuccessmodification') || notificationMessage;
                                break;
                            case 'ADD':
                                notificationMessage = Alpine.store('labels').getLabel('pageInvariant', 'notifsuccesscreation') || notificationMessage;
                                break;
                            case 'DUPLICATE':
                                notificationMessage = Alpine.store('labels').getLabel('pageInvariant', 'notifsuccessduplication') || notificationMessage;
                                break;
                        }

                        sessionStorage.removeItem("INVARIANT_" + this.form.idName);
                        if (this.form.idName === 'SYSTEM') {
                            sessionStorage.removeItem("user");
                        }

                        notifyInPage('success', notificationMessage);
                        this.open = false;

                        const table = $('#invariantsTable').DataTable();
                        table.ajax.reload(null, false);

                    } else {
                        notifyInPage('error', data.message || 'Error');
                    }
                } catch (e) {
                    console.error(e);
                    this.loading = false;
                    notifyInPage('error', 'Unexpected error saving invariant');
                }
            }
        }
    }

    document.addEventListener('alpine:init', () => {
        window.openModalInvariant = function (invariant, value, mode, tab) {
            const modal = document.querySelector('#editInvariantModal');
            if (!modal) { console.error('Modal #editInvariantModal not found'); return; }
            const component = Alpine.$data(modal);
            if (!component || typeof component.openModalInvariant !== 'function') { console.error('openModalInvariant is not available'); return; }
            component.openModalInvariant(invariant, value, mode, tab);
        };
    });
