<!-- Create Test Case - Alpine.js/Tailwind refactored -->
<div
        x-data="testCaseModal()"
        x-init="init()"
        x-show="open"
        x-cloak
        @testcase-modal-open.window="open = true; setDefaultTest($event.detail.defaultTest);"
        class="crb_modal">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/60" @click="open = false"></div>

    <!-- Modal Card -->
    <div :class="isFullscreen ? 'w-full h-full rounded-none' : 'crb_card w-full max-w-3xl rounded-2xl'"
         :style="isFullscreen ? '' : 'max-height: calc(100vh - 4rem); margin: 2rem 1rem;'"
         class="relative bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl flex flex-col transition-all duration-300 z-10"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

        <!-- HEADER -->
        <div class="flex items-center justify-between px-6 py-3 border-b border-slate-200 dark:border-slate-700 shrink-0">
            <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-xl bg-blue-600/10 flex items-center justify-center">
                    <i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div>
                    <h2 class="!text-lg !font-semibold !mb-0 !mt-0" x-text="$store.labels.getLabel('testcaseSimpleCreation','modaltitle')"></h2>
                    <p class="text-xs text-slate-500 !mb-0" x-text="$store.labels.getLabel('testcaseSimpleCreation','modalsubtitle')"></p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button @click="isFullscreen = !isFullscreen"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-blue-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                    <i :data-lucide="isFullscreen ? 'minimize-2' : 'maximize-2'" class="w-4 h-4"></i>
                </button>
                <button @click="open = false"
                        class="h-8 w-8 rounded-lg flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div class="px-6 shrink-0">
            <template x-if="errorMessage">
                <div class="bg-red-100 text-red-800 p-2 rounded-lg flex justify-between items-center mt-2 text-sm">
                    <strong x-text="errorMessage"></strong>
                    <button @click="errorMessage=''" class="ml-2 text-red-600 hover:text-red-800">&times;</button>
                </div>
            </template>
        </div>

        <!-- SCROLLABLE BODY -->
        <div class="flex-1 overflow-y-auto px-6 pb-3 min-h-0">
            <form @submit.prevent="submitForm()" id="createTestCaseForm" role="form" autocomplete="off">

                <!-- Section 1: Application -->
                <div class="rounded-lg border border-slate-200 dark:border-slate-700 p-4 mt-3">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="app-window" class="w-4 h-4 text-blue-600"></i>
                        <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Application</span>
                    </div>

                    <!-- Sélection existante -->
                    <div x-show="!creatingApplication" x-transition>
                        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Choose the application</label>
                        <div x-data="singleSelectDropdown({
                                id: 'editTestCaseSimpleCreationApplication',
                                loader: async () => {
                                    try {
                                        const r = await fetch('ReadApplication');
                                        const d = await r.json();
                                        return d.contentTable.map(a => a.application);
                                    } catch (e) {
                                        console.error('Failed to load applications:', e);
                                        return [];
                                    }
                                }
                            })"
                             x-modelable="selectedValue"
                             x-model="form.application">
                        </div>
                        <div class="mt-2">
                            <button type="button"
                                    @click="creatingApplication = true; form.application=''"
                                    class="text-xs text-blue-600 hover:underline flex items-center gap-1">
                                <i data-lucide="plus" class="w-3 h-3"></i>
                                Create a new application
                            </button>
                        </div>
                    </div>

                    <!-- Création d'une nouvelle app -->
                    <div x-show="creatingApplication" x-transition
                         class="space-y-3 mt-2 rounded-lg p-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700">
                        <div class="flex gap-3">
                            <div class="flex-[1_1_33%] min-w-[150px]">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Name</label>
                                <input type="text" x-model="form.application"
                                       class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                            </div>
                            <div class="flex-[2_1_66%] min-w-[200px]">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">URL</label>
                                <input type="text" x-model="form.url"
                                       class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <div class="flex-1 min-w-[120px]">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Type</label>
                                <select name="editTestCaseSimpleCreationApplicationType" x-model="form.type"
                                        class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                                </select>
                            </div>
                            <div class="flex-1 min-w-[120px]">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Country</label>
                                <select name="editTestCaseSimpleCreationCountry" x-model="form.country"
                                        class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                                </select>
                            </div>
                            <div class="flex-1 min-w-[120px]">
                                <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Environment</label>
                                <select name="editTestCaseSimpleCreationEnvironment" x-model="form.environment"
                                        class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                                </select>
                            </div>
                        </div>
                        <button type="button"
                                @click="creatingApplication=false; form.application='';"
                                class="text-xs text-blue-600 hover:underline flex items-center gap-1">
                            <i data-lucide="arrow-left" class="w-3 h-3"></i>
                            Choose existing application
                        </button>
                    </div>
                </div>

                <!-- Section 2: Description -->
                <div class="rounded-lg border border-slate-200 dark:border-slate-700 p-4 mt-3">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                        <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Description</span>
                    </div>
                    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Describe shortly your test case</label>
                    <input type="text" id="editTestCaseSimpleCreationDescription" x-model="form.description" placeholder="As a user..."
                           class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                </div>

                <!-- Section 3: Folder & Test Case ID -->
                <div class="rounded-lg border border-slate-200 dark:border-slate-700 p-4 mt-3">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="folder" class="w-4 h-4 text-blue-600"></i>
                        <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Test Location</span>
                    </div>
                    <div class="flex gap-3">
                        <!-- Folder dropdown -->
                        <div class="flex-1 min-w-[150px]">
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Test Folder</label>
                            <div x-data="folderDropdown({ model: form.testFolderId, items: tests })"
                                 x-effect="items = tests; selected = form.testFolderId;"
                                 class="relative w-full">

                                <button type="button"
                                        @click="open = !open"
                                        id="editTestCaseSimpleCreationTestFolder"
                                        class="flex h-10 items-center justify-between w-full rounded-md border px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all">
                                    <span x-text="selectedLabel()"></span>
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
                                </button>

                                <!-- Dropdown -->
                                <div x-show="open"
                                     @click.away="open = false"
                                     x-transition
                                     class="absolute mt-1 w-full rounded-md border shadow-lg z-50 bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 max-h-64 overflow-hidden">

                                    <div class="p-2 border-b border-slate-200 dark:border-slate-700">
                                        <input type="text" x-model="search" placeholder="Search or create..."
                                               id="editTestCaseSimpleCreationTestFolderSearch"
                                               class="w-full text-sm border rounded-md px-3 py-1.5 bg-white dark:bg-slate-700 border-slate-300 dark:border-slate-600 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    </div>

                                    <div class="max-h-52 overflow-auto">
                                        <template x-if="filteredItems().length > 0">
                                            <template x-for="item in filteredItems()" :key="item">
                                                <button type="button"
                                                        :id="`editTestCaseSimpleCreationTestFolder${item}`"
                                                        @click="select(item); form.testFolderId = item; $dispatch('folder-selected', item); $nextTick(() => fetchNextTestCaseId());"
                                                        class="w-full text-left px-3 py-2 text-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                                                    <span x-text="item"></span>
                                                </button>
                                            </template>
                                        </template>

                                        <template x-if="filteredItems().length === 0">
                                            <button type="button"
                                                    id="editTestCaseSimpleCreationTestFolderNew"
                                                    @click="createNew(); form.testFolderId = selected; $nextTick(() => fetchNextTestCaseId());"
                                                    class="w-full text-left px-3 py-2 text-sm italic hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                                                Create "<span x-text="search"></span>"
                                            </button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Test Case ID -->
                        <div class="flex-1 min-w-[150px]">
                            <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Test Case ID</label>
                            <input type="text"
                                   x-model="form.testcaseId"
                                   id="editTestCaseSimpleCreationTestcaseId"
                                   class="w-full h-10 border rounded-md px-3 py-2 text-sm bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600 text-slate-900 dark:text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all">
                        </div>
                    </div>
                </div>

            </form>
        </div>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 px-6 py-3 shrink-0">
            <button type="button" @click="open = false"
                    class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-600 text-sm text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Close</button>
            <button type="button" @click="submitForm()"
                    class="px-4 py-2 rounded-md bg-sky-400 text-white text-sm hover:bg-sky-500 transition flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span>Create</span>
            </button>
        </div>
    </div>
</div>

<script>
    function folderDropdown(config = {}) {
        return {
            open: false,
            search: '',
            items: config.items || [],
            selected: config.model ?? '',
            model: config.model ?? '',

            filteredItems() {
                if (!Array.isArray(this.items)) return [];
                const q = this.search.toLowerCase();
                return this.items.filter(i => i.toLowerCase().includes(q));
            },

            select(item) {
                this.selected = item;
                this.model = item;
                this.open = false;
                this.$dispatch('folder-selected', item);
            },

            createNew() {
                if (!this.search.trim()) return;
                const newItem = this.search.trim();
                if (!Array.isArray(this.items)) { this.items = []; }
                if (!this.items.includes(newItem)) { this.items.push(newItem); }
                this.select(newItem);
            },

            selectedLabel() {
                return this.selected || '-- Select Test Folder --';
            }
        }
    }

    function testCaseModal() {
        return {
            open: false,
            isFullscreen: false,
            errorMessage: '',
            creatingApplication: false,
            form: {
                application: '',
                type: '',
                url: '',
                country: '',
                environment: '',
                description: '',
                testFolderId: '',
                testcaseId: ''
            },
            applications: [],
            tests: [],

            async setDefaultTest(test) {
                await this.loadTests();
                await this.loadInvariants();

                if (test && this.tests.includes(test)) {
                    this.form.testFolderId = test;
                    this.$nextTick(() => this.fetchNextTestCaseId());
                }

                this.$nextTick(() => { if (window.lucide) lucide.createIcons(); });
            },

            async loadTests() {
                const resp = await fetch('ReadTest?iSortCol_0=0&sSortDir_0=asc&sColumns=test&iDisplayLength=100');
                const data = await resp.json();
                this.tests = data.contentTable.map(obj => obj.test);
            },

            async loadInvariants() {
                await this.$nextTick();
                const root = this.$root;
                root.querySelectorAll("[name='editTestCaseSimpleCreationApplicationType']").forEach(el => el.innerHTML = '');
                root.querySelectorAll("[name='editTestCaseSimpleCreationCountry']").forEach(el => el.innerHTML = '');
                root.querySelectorAll("[name='editTestCaseSimpleCreationEnvironment']").forEach(el => el.innerHTML = '');
                displayInvariantList("editTestCaseSimpleCreationApplicationType", "APPLITYPE", false);
                displayInvariantList("editTestCaseSimpleCreationCountry", "COUNTRY", false);
                displayInvariantList("editTestCaseSimpleCreationEnvironment", "ENVIRONMENT", false);
            },

            fetchNextTestCaseId() {
                if (!this.form.testFolderId) return;
                fetch(`ReadTestCase?test=${encodeURIComponent(this.form.testFolderId)}&getMaxTC=true`)
                    .then(resp => resp.json())
                    .then(data => { this.form.testcaseId = data.nextAvailableTestcaseId || ''; });
            },

            validateForm() {
                if (!this.form.application) { this.errorMessage = "Please specify the application!"; return false; }
                if (!this.form.testFolderId) { this.errorMessage = "Please specify the test folder!"; return false; }
                if (!this.form.testcaseId) { this.errorMessage = "Please specify the Testcase ID!"; return false; }
                if (this.form.testFolderId.includes('&')) { this.errorMessage = "Test folder name cannot contain &"; return false; }
                if (this.form.testcaseId.includes('&')) { this.errorMessage = "Testcase ID cannot contain &"; return false; }
                this.errorMessage = '';
                return true;
            },

            submitForm() {
                if (!this.validateForm()) return;
                const data = {...this.form, system: getUser().defaultSystem};

                fetch('api/public/testcases/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'X-API-VERSION': 1},
                    body: JSON.stringify(data)
                })
                    .then(resp => resp.json())
                    .then(respData => {
                        if (respData.messageType === 'success' || respData.messageType === 'OK') {
                            if (respData.test && respData.testcase) {
                                window.location.href = `./TestCaseScript.jsp?test=${encodeURIComponent(respData.test)}&testcase=${encodeURIComponent(respData.testcase)}&oneclickcreation=true`;
                            } else {
                                this.errorMessage = "TestCase created but redirect info is missing.";
                            }
                        } else {
                            this.errorMessage = respData.message || "Error during creation.";
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        this.errorMessage = "Unexpected error!";
                    });
            },

            async init() {
                await this.loadTests();
                await this.loadInvariants();
            }
        }
    }
</script>
