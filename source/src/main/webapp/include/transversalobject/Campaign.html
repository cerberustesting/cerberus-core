<script>
(function(){
    function hideLegacyButtons(){
        var m = document.getElementById('editTestcampaignModal');
        if(!m) return;
        var ids = ['resetFilterButton','restoreFilterButton','saveTableConfigurationButton','showHideColumnsButton'];
        ids.forEach(function(id){
            var els = m.querySelectorAll('#'+id);
            els.forEach(function(el){ el.style.display='none'; });
        });
        // Also hide any dt-buttons group
        m.querySelectorAll('.dt-buttons, .DTTT_container').forEach(function(el){ el.style.display='none'; });
    }
    // Run on modal show
    $(document).on('shown.bs.modal','#editTestcampaignModal', function(){
        hideLegacyButtons();
        // Also run after a short delay in case DataTables creates them after modal show
        setTimeout(hideLegacyButtons, 300);
        setTimeout(hideLegacyButtons, 800);
    });
    // Run when any tab is clicked inside the modal (buttons may appear on tab switch)
    $(document).on('click','#editTestcampaignModal [x-data] button', function(){
        setTimeout(hideLegacyButtons, 200);
    });
})();
</script>
